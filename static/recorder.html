<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Ridea</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#2563eb">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Ridea">
  <link rel="apple-touch-icon" href="/static/icon-192.png">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body class="recorder-page">

  <!-- Top bar -->
  <div class="recorder-topbar">
    <div style="display:flex;align-items:center;gap:0.5rem;">
      <i data-lucide="lightbulb" style="width:20px;height:20px;color:var(--blue-600);"></i>
      <span style="font-weight:700;">Ridea</span>
    </div>
    <div style="display:flex;align-items:center;gap:0.75rem;">
      <span id="uname" class="text-sm font-medium">&#8212;</span>
      <a href="/admin" class="btn btn-ghost btn-sm">
        <i data-lucide="settings" style="width:16px;height:16px;"></i> Admin
      </a>
      <button class="btn btn-ghost btn-sm" onclick="doLogout()">
        <i data-lucide="log-out" style="width:16px;height:16px;"></i> Odhlasit
      </button>
    </div>
  </div>

  <!-- Main card -->
  <div class="recorder-card">

    <!-- Department + Role selects -->
    <div style="display:flex;gap:0.5rem;margin-bottom:0.75rem;">
      <select class="select" id="dept" onchange="localStorage.setItem('savedDept', this.value)">
        <option value="">Oddelenie</option>
        <option value="development">Vyvoj</option>
        <option value="marketing">Marketing</option>
        <option value="production">Produkcia</option>
        <option value="management">Manazment</option>
        <option value="other">Ine</option>
      </select>
      <select class="select" id="role" onchange="localStorage.setItem('savedRole', this.value)">
        <option value="">Rola</option>
        <option value="c-level">C-level</option>
        <option value="manager">Manazer</option>
        <option value="employee">Zamestnanec</option>
      </select>
    </div>

    <!-- Visibility toggle -->
    <div class="vis-row" style="margin-bottom:0.75rem;">
      <button type="button" class="vis-btn" id="vis-personal" onclick="setVisibility('personal')">Moj napad</button>
      <button type="button" class="vis-btn active" id="vis-company" onclick="setVisibility('company')">Pre celu firmu</button>
    </div>

    <!-- Tabs: Voice / Text / File -->
    <div class="tab-row" style="margin-bottom:1rem;">
      <button class="tab-btn active" id="tab-voice" onclick="switchTab('voice')">
        <i data-lucide="mic" style="width:14px;height:14px;"></i> Hlasovy
      </button>
      <button class="tab-btn" id="tab-text" onclick="switchTab('text')">
        <i data-lucide="type" style="width:14px;height:14px;"></i> Textovy
      </button>
      <button class="tab-btn" id="tab-file" onclick="switchTab('file')">
        <i data-lucide="paperclip" style="width:14px;height:14px;"></i> Subor
      </button>
    </div>

    <!-- Vault banner -->
    <div class="vault-banner" id="vault-banner" onclick="toggleVaultList()">
      <i data-lucide="hard-drive" style="width:18px;height:18px;"></i>
      <span style="flex:1;font-weight:600;">Neodoslane nahravky</span>
      <span class="text-xs text-muted" id="vault-count"></span>
    </div>
    <div class="vault-list" id="vault-list"></div>

    <!-- Voice panel -->
    <div id="voice-panel" style="display:flex;flex-direction:column;align-items:center;gap:0.75rem;padding:2rem 0;">
      <canvas id="visualizer" style="width:100%;max-width:280px;height:48px;display:none;"></canvas>
      <button class="rec-btn" id="rbtn" onclick="toggleRecord()">
        <div class="rec-dot"></div>
      </button>
      <div class="rec-timer" id="rtime">&#8212;</div>
      <div class="rec-hint" id="rhint">Klikni pre nahravanie</div>
      <div class="text-xs text-muted" id="audio-info"></div>
    </div>

    <!-- Text panel -->
    <div id="text-panel" style="display:none;flex-direction:column;gap:0.5rem;">
      <textarea class="input" id="txtIdea" placeholder="Napiste svoj napad..." style="min-height:120px;"></textarea>
      <button class="btn btn-primary w-full" id="txtSend" onclick="sendTextIdea()">Odoslat textovy napad</button>
    </div>

    <!-- File panel -->
    <div id="file-panel" style="display:none;flex-direction:column;gap:0.625rem;">
      <div class="file-upload-area" id="file-drop-area">
        <div style="font-size:2.25rem;margin-bottom:0.5rem;">
          <i data-lucide="upload-cloud" style="width:36px;height:36px;color:var(--gray-400);"></i>
        </div>
        <div style="color:var(--gray-600);">Kliknite alebo presunete audio subor</div>
        <div class="text-xs text-muted">MP3, WAV, OGG, M4A, WebM, FLAC, OPUS</div>
        <input type="file" id="fileInput" accept="audio/*,.mp3,.wav,.ogg,.m4a,.webm,.flac,.opus,.mp4,.mpeg" style="display:none" onchange="handleFileSelect(this)">
      </div>
      <div id="file-selected" style="display:none;background:var(--gray-50);border-radius:0.5rem;padding:0.75rem;">
        <div id="file-name" class="font-medium"></div>
        <div id="file-size" class="text-xs text-muted"></div>
        <audio id="file-preview" controls style="width:100%;margin-top:0.5rem;"></audio>
      </div>
      <button class="btn btn-primary w-full" id="fileSend" onclick="sendFileIdea()" style="display:none">Odoslat audio napad</button>
    </div>

    <!-- Actions (after recording) -->
    <div id="acts" style="display:none;gap:0.625rem;">
      <button class="btn btn-secondary" onclick="discardRecording()">
        <i data-lucide="x" style="width:16px;height:16px;"></i> Zahodit
      </button>
      <button class="btn btn-primary" id="bsend" onclick="submitIdea()" style="flex:1;">
        <i data-lucide="send" style="width:16px;height:16px;"></i> Odoslat napad
      </button>
    </div>

    <!-- Progress + Status -->
    <div class="progress-bar" style="margin-top:0.75rem;">
      <div class="progress-fill" id="bfill"></div>
    </div>
    <div class="status-msg" id="smsg"></div>
  </div>

  <!-- Recent ideas section -->
  <div style="max-width:40rem;margin:0 auto;padding:0 1.5rem;">
    <div class="recent-section">
      <div class="recent-toggle" id="recent-toggle" onclick="toggleRecent()">&#9662; Posledne napady</div>
      <div class="recent-list" id="recent-list"></div>
    </div>
  </div>

<script>
  /* =====================================================
     CONSTANTS & GLOBALS
     ===================================================== */
  var API_BASE = window.API_BASE || '';

  var mediaRecorder = null;
  var audioChunks = [];
  var audioBlob = null;
  var timerInterval = null;
  var seconds = 0;
  var currentUser = null;
  var currentVisibility = 'company';
  var audioContext = null;
  var analyser = null;
  var animFrameId = null;
  var activeStreams = [];
  var mixedDestination = null;
  var wakeLock = null;
  var silentAudio = null;
  var recordStartTime = null;
  var selectedFile = null;
  var _recentOpen = false;

  /* =====================================================
     AUDIO VAULT — IndexedDB
     ===================================================== */
  var _vaultDB = null;
  var _vaultOpen = false;
  var _vaultSyncing = false;
  var _vaultSyncTimer = null;
  var _vaultLiveId = null;
  var _vaultLiveSaveTimer = null;

  function openVaultDB() {
    return new Promise(function(resolve, reject) {
      if (_vaultDB) { resolve(_vaultDB); return; }
      var req = indexedDB.open('RideaAudioVault', 2);
      req.onupgradeneeded = function(e) {
        var db = e.target.result;
        if (!db.objectStoreNames.contains('recordings')) {
          var store = db.createObjectStore('recordings', { keyPath: 'id', autoIncrement: true });
          store.createIndex('status', 'status', { unique: false });
        }
      };
      req.onsuccess = function(e) {
        _vaultDB = e.target.result;
        resolve(_vaultDB);
      };
      req.onerror = function() {
        reject(new Error('IndexedDB unavailable'));
      };
    });
  }

  function vaultSave(blob, filename, dept, role, visibility) {
    return openVaultDB().then(function(db) {
      return new Promise(function(resolve, reject) {
        var tx = db.transaction('recordings', 'readwrite');
        var store = tx.objectStore('recordings');
        var record = {
          blob: blob,
          filename: filename,
          dept: dept,
          role: role,
          visibility: visibility,
          created: new Date().toISOString(),
          size: blob.size,
          status: 'pending',
          jobId: null,
          errorMsg: null,
          retries: 0,
          nextRetryAt: 0
        };
        var req = store.add(record);
        req.onsuccess = function() { resolve(req.result); };
        req.onerror = function() { reject(new Error('Vault save failed')); };
      });
    });
  }

  function vaultUpdate(id, fields) {
    return openVaultDB().then(function(db) {
      return new Promise(function(resolve, reject) {
        var tx = db.transaction('recordings', 'readwrite');
        var store = tx.objectStore('recordings');
        var getReq = store.get(id);
        getReq.onsuccess = function() {
          var rec = getReq.result;
          if (!rec) { resolve(); return; }
          Object.keys(fields).forEach(function(k) { rec[k] = fields[k]; });
          store.put(rec);
          resolve();
        };
        getReq.onerror = function() { reject(new Error('Vault update failed')); };
      });
    });
  }

  function vaultDelete(id) {
    return openVaultDB().then(function(db) {
      return new Promise(function(resolve, reject) {
        var tx = db.transaction('recordings', 'readwrite');
        tx.objectStore('recordings').delete(id);
        tx.oncomplete = function() { resolve(); };
        tx.onerror = function() { reject(); };
      });
    });
  }

  function vaultGetAll() {
    return openVaultDB().then(function(db) {
      return new Promise(function(resolve) {
        var tx = db.transaction('recordings', 'readonly');
        var store = tx.objectStore('recordings');
        var req = store.getAll();
        req.onsuccess = function() { resolve(req.result || []); };
        req.onerror = function() { resolve([]); };
      });
    });
  }

  function vaultGet(id) {
    return openVaultDB().then(function(db) {
      return new Promise(function(resolve) {
        var tx = db.transaction('recordings', 'readonly');
        var req = tx.objectStore('recordings').get(id);
        req.onsuccess = function() { resolve(req.result || null); };
        req.onerror = function() { resolve(null); };
      });
    });
  }

  /* =====================================================
     VAULT UI
     ===================================================== */
  function toggleVaultList() {
    _vaultOpen = !_vaultOpen;
    document.getElementById('vault-list').classList.toggle('open', _vaultOpen);
  }

  function refreshVaultUI() {
    vaultGetAll().then(function(items) {
      var pending = items.filter(function(i) {
        return i.status !== 'done' && i.status !== 'live';
      });
      var banner = document.getElementById('vault-banner');
      var list = document.getElementById('vault-list');

      if (pending.length === 0) {
        banner.classList.remove('show');
        list.classList.remove('open');
        list.innerHTML = '';
        _vaultOpen = false;
        return;
      }

      banner.classList.add('show');
      document.getElementById('vault-count').textContent =
        pending.length + ' zaznam' + (pending.length > 1 ? 'ov' : '');

      var html = '';
      pending.forEach(function(item) {
        var d = new Date(item.created);
        var time = d.getDate() + '.' + (d.getMonth() + 1) + '. ' +
          d.getHours() + ':' + (d.getMinutes() < 10 ? '0' : '') + d.getMinutes();
        var sizeMB = (item.size / 1024 / 1024).toFixed(1);
        var statusLabel = item.status === 'pending' ? 'Caka'
          : item.status === 'uploading' ? 'Odosielam...' : 'Chyba';
        var statusCls = item.status === 'pending' ? 'pending'
          : item.status === 'uploading' ? 'uploading' : 'error';

        html += '<div class="vault-item" id="vault-item-' + item.id + '">';
        html += '<div class="vi-top"><span class="vi-info">' + time + ' &middot; ' + sizeMB + ' MB</span>';
        html += '<span class="vi-status ' + statusCls + '">' + statusLabel + '</span></div>';
        if (item.errorMsg) {
          html += '<div style="font-size:10px;color:#f87171;margin-top:3px">' + item.errorMsg + '</div>';
        }
        html += '<div class="vi-actions">';
        if (item.status !== 'uploading') {
          html += '<button class="vi-btn retry" onclick="vaultRetry(' + item.id + ')">&#8635; Odoslat znova</button>';
        }
        html += '<button class="vi-btn download" onclick="vaultDownload(' + item.id + ')">&#11015; Stiahnut</button>';
        html += '<button class="vi-btn delete" onclick="vaultRemove(' + item.id + ')">&#10005;</button>';
        html += '</div></div>';
      });
      list.innerHTML = html;
    });
  }

  function vaultDownload(id) {
    vaultGet(id).then(function(rec) {
      if (!rec) return;
      var url = URL.createObjectURL(rec.blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = rec.filename || ('nahravka_' + id + '.webm');
      a.click();
      setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
    });
  }

  function vaultRemove(id) {
    if (!confirm('Naozaj vymazat nahravku? Tato akcia je nevratna.')) return;
    vaultDelete(id).then(refreshVaultUI);
  }

  function vaultRetry(id) {
    vaultGet(id).then(function(rec) {
      if (!rec || !rec.blob) {
        setMsg('Nahravka nenajdena', 'err');
        return;
      }
      vaultUpdate(id, { status: 'uploading', errorMsg: null, retries: rec.retries + 1 })
        .then(function() {
          refreshVaultUI();
          _doVaultUpload(id, rec.blob, rec.filename, rec.dept, rec.role, rec.visibility);
        });
    });
  }

  /* =====================================================
     VAULT UPLOAD
     ===================================================== */
  function _doVaultUpload(vaultId, blob, filename, dept, role, visibility) {
    if (blob.size < 5000) {
      console.log('VaultUpload: skipping tiny recording (' + blob.size + ' bytes)');
      vaultUpdate(vaultId, { status: 'error', errorMsg: 'Nahravka prilis kratka' })
        .then(refreshVaultUI);
      return;
    }

    var fill = document.getElementById('bfill');
    fill.style.width = '15%';
    var sizeMB = (blob.size / 1024 / 1024).toFixed(1);
    setMsg('Odosielam zalohovanu nahravku (' + sizeMB + ' MB)...', 'inf');

    var fd = new FormData();
    fd.append('audio', blob, filename);
    fd.append('department', dept);
    fd.append('role', role);
    fd.append('visibility', visibility);

    var ctrl = new AbortController();
    var tout = setTimeout(function() { ctrl.abort(); }, 300000);

    fetch(API_BASE + '/api/ideas/upload', {
      method: 'POST',
      body: fd,
      credentials: 'include',
      signal: ctrl.signal
    }).then(function(r) {
      clearTimeout(tout);
      if (!r.ok) return r.json().then(function(d) { throw new Error(d.error || 'Chyba ' + r.status); });
      return r.json();
    }, function(e) {
      clearTimeout(tout);
      throw e;
    }).then(function(data) {
      if (data.job_id) {
        setMsg('Prepisujem...', 'inf');
        fill.style.width = '40%';
        vaultUpdate(vaultId, { jobId: data.job_id });
        return _pollVaultJob(vaultId, data.job_id, fill);
      } else {
        fill.style.width = '100%';
        setMsg('Napad odoslany!', 'ok');
        if (_recentOpen) loadRecentIdeas();
        vaultUpdate(vaultId, { status: 'done' }).then(function() {
          setTimeout(function() {
            vaultDelete(vaultId).then(refreshVaultUI);
            fill.style.width = '0%';
            clearMsg();
          }, 3000);
        });
      }
    }).catch(function(err) {
      fill.style.width = '0%';
      setMsg('Chyba: ' + err.message + ' - nahravka ulozena lokalne', 'err');
      vaultUpdate(vaultId, { status: 'error', errorMsg: err.message }).then(refreshVaultUI);
    });
  }

  function _pollVaultJob(vaultId, jobId, fill) {
    var attempts = 0;
    function poll() {
      if (attempts >= 200) {
        setMsg('Timeout - nahravka ulozena lokalne, skus znova', 'err');
        fill.style.width = '0%';
        vaultUpdate(vaultId, { status: 'error', errorMsg: 'Timeout' }).then(refreshVaultUI);
        return;
      }
      attempts++;

      fetch(API_BASE + '/api/ideas/job/' + jobId, { credentials: 'include' })
        .then(function(r) {
          if (r.status === 202) {
            fill.style.width = Math.min(40 + attempts, 95) + '%';
            if (attempts % 10 === 0) setMsg('Prepisujem... este chvilu', 'inf');
            setTimeout(poll, 3000);
            return;
          }
          if (r.ok) {
            fill.style.width = '100%';
            setMsg('Napad odoslany!', 'ok');
            if (_recentOpen) loadRecentIdeas();
            vaultUpdate(vaultId, { status: 'done' }).then(function() {
              setTimeout(function() {
                vaultDelete(vaultId).then(refreshVaultUI);
                fill.style.width = '0%';
                clearMsg();
              }, 3000);
            });
          } else if (r.status === 404) {
            fetch(API_BASE + '/api/ideas/my-recent', { credentials: 'include' })
              .then(function(mr) { return mr.ok ? mr.json() : []; })
              .then(function(recent) {
                var now = Date.now();
                var found = (recent || []).some(function(idea) {
                  return (now - new Date(idea.created_at).getTime()) < 120000;
                });
                if (found) {
                  fill.style.width = '100%';
                  setMsg('Napad odoslany!', 'ok');
                  vaultUpdate(vaultId, { status: 'done' }).then(function() {
                    setTimeout(function() {
                      vaultDelete(vaultId).then(refreshVaultUI);
                      fill.style.width = '0%';
                      clearMsg();
                    }, 3000);
                  });
                } else {
                  setMsg('Spracovanie prebieha...', 'inf');
                  setTimeout(poll, 3000);
                }
              }).catch(function() { setTimeout(poll, 3000); });
          } else {
            r.json().catch(function() { return {}; }).then(function(d) {
              setMsg(d.error || 'Chyba pri spracovani', 'err');
              fill.style.width = '0%';
              vaultUpdate(vaultId, { status: 'error', errorMsg: d.error || 'Server error' })
                .then(refreshVaultUI);
            });
          }
        }).catch(function() { setTimeout(poll, 3000); });
    }
    setTimeout(poll, 3000);
  }

  /* =====================================================
     VAULT LIVE SAVE (during recording)
     ===================================================== */
  function vaultStartLiveSave(dept, role, visibility) {
    _vaultLiveId = null;
    if (_vaultLiveSaveTimer) clearInterval(_vaultLiveSaveTimer);

    _vaultLiveSaveTimer = setInterval(function() {
      if (!audioChunks || audioChunks.length === 0) return;
      var mime = 'audio/webm;codecs=opus';
      var liveBlob = new Blob(audioChunks, { type: mime });

      if (_vaultLiveId) {
        vaultUpdate(_vaultLiveId, { blob: liveBlob, size: liveBlob.size }).catch(function() {});
      } else {
        openVaultDB().then(function(db) {
          return new Promise(function(resolve) {
            var tx = db.transaction('recordings', 'readwrite');
            var store = tx.objectStore('recordings');
            var record = {
              blob: liveBlob,
              filename: 'live_' + Date.now() + '.webm',
              dept: dept,
              role: role,
              visibility: visibility,
              created: new Date().toISOString(),
              size: liveBlob.size,
              status: 'live',
              jobId: null,
              errorMsg: null,
              retries: 0,
              nextRetryAt: 0
            };
            var req = store.add(record);
            req.onsuccess = function() { _vaultLiveId = req.result; resolve(); };
            req.onerror = function() { resolve(); };
          });
        }).catch(function() {});
      }
    }, 10000);
  }

  function vaultStopLiveSave() {
    if (_vaultLiveSaveTimer) {
      clearInterval(_vaultLiveSaveTimer);
      _vaultLiveSaveTimer = null;
    }
    if (_vaultLiveId) {
      var liveId = _vaultLiveId;
      _vaultLiveId = null;
      vaultDelete(liveId).catch(function() {});
    }
  }

  function vaultPromoteLive() {
    if (_vaultLiveSaveTimer) {
      clearInterval(_vaultLiveSaveTimer);
      _vaultLiveSaveTimer = null;
    }
    if (_vaultLiveId) {
      var liveId = _vaultLiveId;
      _vaultLiveId = null;
      return vaultUpdate(liveId, {
        status: 'pending',
        filename: 'prerusena_' + Date.now() + '.webm'
      }).then(function() {
        refreshVaultUI();
        return liveId;
      });
    }
    return Promise.resolve(null);
  }

  /* =====================================================
     VAULT AUTO-SYNC
     ===================================================== */
  function vaultAutoSync() {
    if (_vaultSyncing) return;
    if (!currentUser) return;

    vaultGetAll().then(function(items) {
      var now = Date.now();
      var toUpload = items.filter(function(i) {
        if (i.status === 'done' || i.status === 'live' || i.status === 'uploading') return false;
        if (i.status === 'error' && i.nextRetryAt && now < i.nextRetryAt) return false;
        return true;
      });
      if (toUpload.length === 0) return;

      _vaultSyncing = true;
      var item = toUpload[0];
      console.log('VaultAutoSync: uploading id=' + item.id);

      vaultUpdate(item.id, { status: 'uploading', errorMsg: null }).then(function() {
        refreshVaultUI();
        _doVaultUploadAsync(item.id, item.blob, item.filename, item.dept, item.role, item.visibility)
          .finally(function() { _vaultSyncing = false; });
      });
    }).catch(function() { _vaultSyncing = false; });
  }

  function _doVaultUploadAsync(vaultId, blobData, filename, dept, role, visibility) {
    var fd = new FormData();
    fd.append('audio', blobData, filename);
    fd.append('department', dept);
    fd.append('role', role);
    fd.append('visibility', visibility);

    var ctrl = new AbortController();
    var tout = setTimeout(function() { ctrl.abort(); }, 300000);

    return fetch(API_BASE + '/api/ideas/upload', {
      method: 'POST',
      body: fd,
      credentials: 'include',
      signal: ctrl.signal
    }).then(function(r) {
      clearTimeout(tout);
      return r;
    }, function(e) {
      clearTimeout(tout);
      throw e;
    }).then(function(r) {
      if (!r.ok) return r.json().then(function(d) { throw new Error(d.error || 'Chyba ' + r.status); });
      return r.json();
    }).then(function(data) {
      if (data.job_id) {
        vaultUpdate(vaultId, { jobId: data.job_id });
        return _pollVaultJobAsync(vaultId, data.job_id);
      } else {
        return vaultUpdate(vaultId, { status: 'done' }).then(function() {
          setTimeout(function() {
            vaultDelete(vaultId).then(refreshVaultUI);
          }, 3000);
        });
      }
    }).catch(function(err) {
      return vaultGet(vaultId).then(function(rec) {
        var retries = rec ? (rec.retries || 0) : 0;
        var delaySec = Math.min(30 * Math.pow(2, retries), 300);
        var nextRetry = Date.now() + delaySec * 1000;
        return vaultUpdate(vaultId, {
          status: 'error',
          errorMsg: err.message,
          retries: retries + 1,
          nextRetryAt: nextRetry
        });
      }).then(refreshVaultUI);
    });
  }

  function _pollVaultJobAsync(vaultId, jobId) {
    return new Promise(function(resolve) {
      var attempts = 0;
      function poll() {
        if (attempts >= 200) {
          vaultUpdate(vaultId, { status: 'error', errorMsg: 'Timeout' }).then(function() {
            refreshVaultUI();
            resolve();
          });
          return;
        }
        attempts++;

        fetch(API_BASE + '/api/ideas/job/' + jobId, { credentials: 'include' })
          .then(function(r) {
            if (r.status === 202) {
              setTimeout(poll, 3000);
              return;
            }
            if (r.ok) {
              vaultUpdate(vaultId, { status: 'done' }).then(function() {
                setTimeout(function() {
                  vaultDelete(vaultId).then(refreshVaultUI);
                }, 3000);
                resolve();
              });
            } else if (r.status === 404) {
              fetch(API_BASE + '/api/ideas/my-recent', { credentials: 'include' })
                .then(function(mr) { return mr.ok ? mr.json() : []; })
                .then(function(recent) {
                  var found = (recent || []).some(function(idea) {
                    return (Date.now() - new Date(idea.created_at).getTime()) < 120000;
                  });
                  if (found) {
                    vaultUpdate(vaultId, { status: 'done' }).then(function() {
                      setTimeout(function() {
                        vaultDelete(vaultId).then(refreshVaultUI);
                      }, 3000);
                      resolve();
                    });
                  } else {
                    setTimeout(poll, 3000);
                  }
                }).catch(function() { setTimeout(poll, 3000); });
            } else {
              r.json().catch(function() { return {}; }).then(function(d) {
                vaultUpdate(vaultId, { status: 'error', errorMsg: d.error || 'Server error' })
                  .then(function() {
                    refreshVaultUI();
                    resolve();
                  });
              });
            }
          }).catch(function() { setTimeout(poll, 3000); });
      }
      setTimeout(poll, 3000);
    });
  }

  /* =====================================================
     RECORDING
     ===================================================== */
  async function toggleRecord() {
    if (mediaRecorder && mediaRecorder.state === 'recording') {
      stopRecording();
    } else {
      await startRecording();
    }
  }

  async function startRecording() {
    var dept = document.getElementById('dept').value;
    var role = document.getElementById('role').value;
    if (!dept || !role) {
      setMsg('Vyber oddelenie a rolu', 'err');
      return;
    }

    var micStream = null;
    var sources = [];
    activeStreams = [];

    try {
      micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      activeStreams.push(micStream);
      sources.push('mikrofon');
    } catch (e) {
      setMsg(
        e.name === 'NotAllowedError'
          ? 'Povolte pristup k mikrofonu v nastaveniach prehliadaca'
          : 'Chyba: ' + e.message,
        'err'
      );
      return;
    }

    try {
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      mixedDestination = audioContext.createMediaStreamDestination();
      var micSource = audioContext.createMediaStreamSource(micStream);
      micSource.connect(mixedDestination);

      analyser = audioContext.createAnalyser();
      analyser.fftSize = 128;
      micSource.connect(analyser);

      var mixedStream = mixedDestination.stream;
      var infoEl = document.getElementById('audio-info');
      infoEl.innerHTML = '<span style="color:var(--green-500);">' + sources.join(' + ') + '</span>';

      // Start visualizer
      var canvas = document.getElementById('visualizer');
      canvas.style.display = 'block';
      var ctx = canvas.getContext('2d');
      canvas.width = canvas.offsetWidth * 2;
      canvas.height = canvas.offsetHeight * 2;
      var bufLen = analyser.frequencyBinCount;
      var data = new Uint8Array(bufLen);
      var barW = canvas.width / bufLen;

      function draw() {
        animFrameId = requestAnimationFrame(draw);
        analyser.getByteFrequencyData(data);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (var i = 0; i < bufLen; i++) {
          var v = data[i] / 255;
          var h = v * canvas.height;
          var x = i * barW;
          var r = 37 + Math.round(v * 62);
          var g = 99 + Math.round(v * 50);
          var b = 235;
          ctx.fillStyle = 'rgba(' + r + ',' + g + ',' + b + ',' + (0.5 + v * 0.5) + ')';
          ctx.fillRect(x, canvas.height - h, barW - 1, h);
        }
      }
      draw();

      // Start MediaRecorder
      audioChunks = [];
      var mime = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
        ? 'audio/webm;codecs=opus' : 'audio/webm';

      mediaRecorder = new MediaRecorder(mixedStream, {
        mimeType: mime,
        audioBitsPerSecond: 32000
      });

      mediaRecorder.ondataavailable = function(e) {
        if (e.data.size > 0) audioChunks.push(e.data);
      };

      mediaRecorder.onstop = function() {
        audioBlob = new Blob(audioChunks, { type: mime });
        var sizeMB = (audioBlob.size / 1024 / 1024).toFixed(1);
        stopAllStreams();
        stopVisualizer();
        document.getElementById('acts').style.display = 'flex';
        document.getElementById('rhint').textContent = 'Nahravka pripravena';
        document.getElementById('audio-info').innerHTML =
          '<span style="color:var(--green-500);">' + sizeMB + ' MB</span>';
      };

      mediaRecorder.start(1000);
      vaultStartLiveSave(dept, role, currentVisibility);
      await requestWakeLock();
      startSilentAudio();

      if (/Android/i.test(navigator.userAgent)) {
        setMsg('\u26a0 Nezasknavajte obrazovku - nahravanie sa zastavi', 'inf');
      }

      document.getElementById('rbtn').classList.add('recording');
      document.getElementById('rhint').textContent = 'Nahravam... klikni pre zastavenie';
      document.getElementById('acts').style.display = 'none';
      seconds = 0;
      recordStartTime = Date.now();
      document.getElementById('rtime').textContent = '0:00';

      timerInterval = setInterval(function() {
        seconds = Math.floor((Date.now() - recordStartTime) / 1000);
        var m = Math.floor(seconds / 60), s = seconds % 60;
        document.getElementById('rtime').textContent = m + ':' + (s < 10 ? '0' : '') + s;
      }, 1000);

      clearMsg();
    } catch (e) {
      stopAllStreams();
      setMsg('Chyba: ' + e.message, 'err');
    }
  }

  function stopAllStreams() {
    activeStreams.forEach(function(s) {
      s.getTracks().forEach(function(t) { t.stop(); });
    });
    activeStreams = [];
  }

  function stopRecording() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    clearInterval(timerInterval);
    vaultStopLiveSave();
    releaseWakeLock();
    stopSilentAudio();
    recordStartTime = null;
    document.getElementById('rbtn').classList.remove('recording');
  }

  function discardRecording() {
    audioBlob = null;
    audioChunks = [];
    stopAllStreams();
    stopVisualizer();
    vaultStopLiveSave();
    releaseWakeLock();
    stopSilentAudio();
    recordStartTime = null;
    document.getElementById('acts').style.display = 'none';
    document.getElementById('rbtn').classList.remove('recording');
    document.getElementById('rtime').textContent = '\u2014';
    document.getElementById('rhint').textContent = 'Klikni pre nahravanie';
    document.getElementById('audio-info').innerHTML = '';
    clearMsg();
  }

  /* =====================================================

  async function submitIdea() {
    if (!audioBlob) return;
    if (audioBlob.size < 5000) {

      return;
    }

    var dept = document.getElementById('dept').value;

    if (!dept || !role) {

      return;
    }

    var btn = document.getElementById('bsend');
    btn.disabled = true;
    btn.textContent = 'Odosiela sa...';
    var fill = document.getElementById('bfill');
    fill.style.width = '5%';

    var ext = audioBlob.type.indexOf('ogg') >= 0 ? 'ogg'
      : audioBlob.type.indexOf('mp4') >= 0 ? 'mp4' : 'webm';
    var filename = 'idea_' + Date.now() + '.' + ext;

    var vaultId = null;
    try {
      vaultId = await vaultSave(audioBlob, filename, dept, role, currentVisibility);
      setMsg('Nahravka zalohovana. Odosielam...', 'inf');
      fill.style.width = '15%';
      refreshVaultUI();
    } catch (e) {
      console.log('Vault save failed:', e);
    }

    try {
      var fd = new FormData();
      fd.append('audio', audioBlob, filename);
      fd.append('department', dept);
      fd.append('role', role);
      fd.append('visibility', currentVisibility);

      var uploadCtrl = new AbortController();
      var uploadTout = setTimeout(function() { uploadCtrl.abort(); }, 300000);
      var sizeMB = (audioBlob.size / 1024 / 1024).toFixed(1);
      setMsg('Odosielam ' + sizeMB + ' MB...', 'inf');

      var r;
      try {
        r = await fetch(API_BASE + '/api/ideas/upload', {
          method: 'POST',
          body: fd,
          credentials: 'include',
          signal: uploadCtrl.signal
        });
      } finally {
        clearTimeout(uploadTout);
      }

      if (!r.ok) {
        var d = await r.json().catch(function() { return {}; });
        throw new Error(d.error || 'Chyba ' + r.status);
      }

      var data = await r.json();
      if (vaultId) await vaultUpdate(vaultId, { status: 'uploading', jobId: data.job_id || null });

      if (data.job_id) {
        setMsg('Ukladam na server...', 'inf');
        fill.style.width = '40%';
        await pollJob(data.job_id, fill, btn, vaultId);
      } else {
        fill.style.width = '100%';
        setMsg('Napad ulozeny!', 'ok');
        if (_recentOpen) loadRecentIdeas();
        if (vaultId) {
          vaultUpdate(vaultId, { status: 'done' }).then(function() {
            setTimeout(function() { vaultDelete(vaultId).then(refreshVaultUI); }, 5000);
          });
        }
        setTimeout(function() {
          discardRecording();
          fill.style.width = '0%';
        }, 2500);
        btn.disabled = false;
        btn.textContent = 'Odoslat napad';
      }
    } catch (e) {
      if (vaultId) {
        setMsg('Odosielanie zlyhalo - skusam znova na pozadi...', 'inf');
        vaultUpdate(vaultId, { status: 'error', errorMsg: e.message }).then(function() {
          refreshVaultUI();
          setTimeout(vaultAutoSync, 3000);
        });
        discardRecording();
      } else {
        setMsg('Chyba: ' + e.message, 'err');
      }
      btn.disabled = false;
      btn.textContent = 'Odoslat napad';
      fill.style.width = '0%';
    }
  }

  /* =====================================================
     POLL JOB (voice recording)
     ===================================================== */
  async function pollJob(jobId, fill, btn, vaultId) {
    var attempts = 0;
    while (attempts < 200) {
      await new Promise(function(r) { setTimeout(r, 3000); });
      attempts++;
      try {
        var r = await fetch(API_BASE + '/api/ideas/job/' + jobId, { credentials: 'include' });

        if (r.status === 202) {
          fill.style.width = Math.min(40 + attempts, 95) + '%';
          if (attempts % 10 === 0) setMsg('Prepisujem... este chvilu', 'inf');
          continue;
        }

        if (r.ok) {
          var data = await r.json();
          fill.style.width = '100%';
          if (vaultId) {
            vaultUpdate(vaultId, { status: 'done' }).then(function() {
              setTimeout(function() { vaultDelete(vaultId).then(refreshVaultUI); }, 5000);
            });
          }
          if (data.warning) {
            setMsg(data.warning, 'err');
            setTimeout(function() {
              discardRecording();
              fill.style.width = '0%';
            }, 8000);
          } else {
            setMsg('Napad odoslany!', 'ok');
            if (_recentOpen) loadRecentIdeas();
            setTimeout(function() {
              discardRecording();
              fill.style.width = '0%';
            }, 2500);
          }
        } else if (r.status === 404) {
          try {
            var mr = await fetch(API_BASE + '/api/ideas/my-recent', { credentials: 'include' });
            var recent = mr.ok ? await mr.json() : [];
            var now = Date.now();
            var found = (recent || []).some(function(idea) {
              return (now - new Date(idea.created_at).getTime()) < 120000;
            });
            if (found) {
              fill.style.width = '100%';
              setMsg('Napad odoslany!', 'ok');
              if (_recentOpen) loadRecentIdeas();
              if (vaultId) {
                vaultUpdate(vaultId, { status: 'done' }).then(function() {
                  setTimeout(function() { vaultDelete(vaultId).then(refreshVaultUI); }, 5000);
                });
              }
              setTimeout(function() {
                discardRecording();
                fill.style.width = '0%';
              }, 2500);
            } else {
              setMsg('Spracovanie prebieha...', 'inf');
              continue;
            }
          } catch (e2) {
            continue;
          }
        } else {
          var d = await r.json().catch(function() { return {}; });
          setMsg(d.error || 'Chyba pri spracovani', 'err');
          fill.style.width = '0%';
          if (vaultId) {
            vaultUpdate(vaultId, { status: 'error', errorMsg: d.error || 'Server error' })
              .then(refreshVaultUI);
          }
        }
        break;
      } catch (e) {
        continue;
      }
    }

    if (attempts >= 200) {
      setMsg('Timeout - nahravka ulozena lokalne', 'err');
      fill.style.width = '0%';
      if (vaultId) {
        vaultUpdate(vaultId, { status: 'error', errorMsg: 'Timeout' }).then(refreshVaultUI);
      }
    }
    btn.disabled = false;
    btn.textContent = 'Odoslat napad';
  }

    var allowed = ['mp3', 'wav', 'ogg', 'm4a', 'webm', 'flac', 'opus', 'mp4', 'mpeg', 'wma', 'aac'];
    if (allowed.indexOf(ext) === -1 && !file.type.startsWith('audio/')) {
      setMsg('Nepodporovany format. Pouzite audio subor.', 'err');
      return;
    }
    if (file.size > 200 * 1024 * 1024) {
      setMsg('Subor je prilis velky (max 200MB)', 'err');
      return;

    selectedFile = file;
    document.getElementById('file-drop-area').style.display = 'none';
    document.getElementById('file-selected').style.display = 'block';
    document.getElementById('fileSend').style.display = 'block';
    document.getElementById('file-name').textContent = file.name;
    var sizeMB = (file.size / 1024 / 1024).toFixed(1);
    document.getElementById('file-size').textContent = sizeMB + ' MB';
    var preview = document.getElementById('file-preview');
    preview.src = URL.createObjectURL(file);
    clearMsg();
  }

      fd.append('role', role);
      fd.append('visibility', currentVisibility);

      var fCtrl = new AbortController();
      var fTout = setTimeout(function() { fCtrl.abort(); }, 300000);
      var fSizeMB = (selectedFile.size / 1024 / 1024).toFixed(1);
      setMsg('Odosielam ' + fSizeMB + ' MB...', 'inf');

      var r;
      try {
        r = await fetch(API_BASE + '/api/ideas/upload', {
          method: 'POST',
          body: fd,
          credentials: 'include',
          signal: fCtrl.signal
        });
      } finally {
        clearTimeout(fTout);
      }

      if (!r.ok) {
        var d = await r.json().catch(function() { return {}; });
        throw new Error(d.error || 'Chyba ' + r.status);
      }

      var data = await r.json();
      if (vaultId) await vaultUpdate(vaultId, { status: 'uploading', jobId: data.job_id || null });

      if (data.job_id) {
        setMsg('Ukladam na server...', 'inf');
        fill.style.width = '40%';
        await pollFileJob(data.job_id, fill, btn, vaultId);
      } else {
        fill.style.width = '100%';
        setMsg('Napad odoslany!', 'ok');
        if (_recentOpen) loadRecentIdeas();
        if (vaultId) {
          vaultUpdate(vaultId, { status: 'done' }).then(function() {
            setTimeout(function() { vaultDelete(vaultId).then(refreshVaultUI); }, 5000);
          });
        }
        setTimeout(function() {
          resetFileUpload();
          fill.style.width = '0%';
          clearMsg();
        }, 2500);
        btn.disabled = false;
        btn.textContent = 'Odoslat audio napad';
      }
    } catch (e) {
      if (vaultId) {
        setMsg('Chyba: ' + e.message + ' \u2014 subor je ulozeny lokalne', 'err');
        vaultUpdate(vaultId, { status: 'error', errorMsg: e.message }).then(refreshVaultUI);
      } else {
        setMsg('Chyba: ' + e.message, 'err');
      }
      btn.disabled = false;
      btn.textContent = 'Odoslat audio napad';
      fill.style.width = '0%';
    }
  }

  /* =====================================================
     POLL FILE JOB
     ===================================================== */
  async function pollFileJob(jobId, fill, btn, vaultId) {
    var attempts = 0;
    while (attempts < 200) {
      await new Promise(function(r) { setTimeout(r, 3000); });
      attempts++;
      try {
        var r = await fetch(API_BASE + '/api/ideas/job/' + jobId, { credentials: 'include' });

        if (r.status === 202) {
          fill.style.width = Math.min(40 + attempts, 95) + '%';
          if (attempts % 10 === 0) setMsg('Prepisujem... este chvilu', 'inf');
          continue;
        }

        if (r.ok) {
          var data = await r.json();
          fill.style.width = '100%';
          if (vaultId) {
            vaultUpdate(vaultId, { status: 'done' }).then(function() {
              setTimeout(function() { vaultDelete(vaultId).then(refreshVaultUI); }, 5000);
            });
          }
          if (data.warning) {
            setMsg(data.warning, 'err');
            setTimeout(function() {
              resetFileUpload();
              fill.style.width = '0%';
            }, 8000);
          } else {
            setMsg('Napad odoslany!', 'ok');
            if (_recentOpen) loadRecentIdeas();
            setTimeout(function() {
              resetFileUpload();
              fill.style.width = '0%';
              clearMsg();
            }, 2500);
          }
        } else if (r.status === 404) {
          try {
            var mr = await fetch(API_BASE + '/api/ideas/my-recent', { credentials: 'include' });
            var recent = mr.ok ? await mr.json() : [];
            var now = Date.now();
            var found = (recent || []).some(function(idea) {
              return (now - new Date(idea.created_at).getTime()) < 120000;
            });
            if (found) {
              fill.style.width = '100%';
              setMsg('Napad odoslany!', 'ok');
              if (_recentOpen) loadRecentIdeas();
              if (vaultId) {
                vaultUpdate(vaultId, { status: 'done' }).then(function() {
                  setTimeout(function() { vaultDelete(vaultId).then(refreshVaultUI); }, 5000);
                });
              }
              setTimeout(function() {
                resetFileUpload();
                fill.style.width = '0%';
                clearMsg();
              }, 2500);
            } else {
              setMsg('Spracovanie prebieha...', 'inf');
              continue;
            }
          } catch (e2) {
            continue;
          }
        } else {
          var d = await r.json().catch(function() { return {}; });
          setMsg(d.error || 'Chyba pri spracovani', 'err');
          fill.style.width = '0%';
          if (vaultId) {
            vaultUpdate(vaultId, { status: 'error', errorMsg: d.error || 'Server error' })
              .then(refreshVaultUI);
          }
        }
        break;
      } catch (e) {
        continue;
      }
    }

    if (attempts >= 200) {
      setMsg('Timeout - nahravka ulozena lokalne', 'err');
      fill.style.width = '0%';
      if (vaultId) {
        vaultUpdate(vaultId, { status: 'error', errorMsg: 'Timeout' }).then(refreshVaultUI);
      }
    }
    btn.disabled = false;
    btn.textContent = 'Odoslat audio napad';
  }

  /* =====================================================
     STATUS MESSAGES
     ===================================================== */
  function setMsg(t, c) {
    var e = document.getElementById('smsg');
    e.textContent = t;
    e.className = 'status-msg ' + c;
  }

  function clearMsg() {
    var e = document.getElementById('smsg');
    e.textContent = '';
    e.className = 'status-msg';
  }

  /* =====================================================
     RECENT IDEAS
     ===================================================== */
  function toggleRecent() {
    _recentOpen = !_recentOpen;
    var list = document.getElementById('recent-list');
    var toggle = document.getElementById('recent-toggle');
    if (_recentOpen) {
      list.classList.add('open');
      toggle.innerHTML = '&#9652; Posledne napady';
      loadRecentIdeas();
    } else {
      list.classList.remove('open');
      toggle.innerHTML = '&#9662; Posledne napady';
    }
  }

  async function loadRecentIdeas() {
    var list = document.getElementById('recent-list');
    list.innerHTML = '<div class="text-xs text-muted" style="text-align:center;padding:12px;">Nacitavam...</div>';

    try {
      var r = await fetch(API_BASE + '/api/ideas/my-recent', { credentials: 'include' });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      var data = await r.json();

      if (!data.length) {
        list.innerHTML = '<div class="text-xs text-muted" style="text-align:center;padding:12px;">Ziadne napady</div>';
        return;
      }

      var html = '';
      for (var i = 0; i < data.length; i++) {
        var idea = data[i];
        var date = idea.created_at
          ? new Date(idea.created_at).toLocaleString('sk-SK', {
              day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit'
            })
          : '';
        var badge = idea.stt_engine === 'elevenlabs'
          ? '<span class="ri-badge el">EL</span>'
          : idea.stt_engine === 'whisper'
            ? '<span class="ri-badge wh">W</span>'
            : '';
        var dur = idea.duration ? Math.round(idea.duration) + 's' : '';
        var vis = idea.visibility === 'company' ? '\uD83C\uDFE2' : '\uD83D\uDD12';

        html += '<div class="recent-item" onclick="window.open(\'/admin#idea-' + idea.id + '\', \'_blank\')">';
        html += '<div class="ri-top"><span class="ri-id">#' + idea.id + '</span><span>' + date + '</span></div>';
        html += '<div class="ri-text">' + escapeHtml(idea.preview) + '</div>';
        html += '<div class="ri-meta"><span>' + vis + ' ' + (idea.department || '') + '</span>';
        if (dur) html += '<span>' + dur + '</span>';
        html += badge + '</div></div>';
      }
      list.innerHTML = html;
    } catch (e) {
      list.innerHTML = '<div style="text-align:center;padding:12px;font-size:11px;color:#f87171;">Chyba: ' + e.message + '</div>';
    }
  }

  function escapeHtml(t) {
    var d = document.createElement('div');
    d.textContent = t;
    return d.innerHTML;
  }

  /* =====================================================
     AUTH & INIT
     ===================================================== */
  async function init() {
    try {
      var r = await fetch(API_BASE + '/api/current-user', { credentials: 'include' });
      if (!r.ok) {
        window.location.href = '/login';
        return;
      }
      currentUser = await r.json();
      document.getElementById('uname').textContent = currentUser.name;
      vaultStartAutoSync();

      var savedDept = localStorage.getItem('savedDept') || currentUser.department || '';
      var savedRole = localStorage.getItem('savedRole') || '';
      if (savedDept) document.getElementById('dept').value = savedDept;
      if (savedRole) document.getElementById('role').value = savedRole;
    } catch (e) {
      setMsg('Chyba pripojenia k serveru', 'err');
    }
  }

  async function doLogout() {
    try {
      await fetch(API_BASE + '/api/logout', { method: 'POST', credentials: 'include' });
    } catch (e) {}
    window.location.href = '/login';
  }

  /* =====================================================
     BOOTSTRAP
     ===================================================== */
  init();
  refreshVaultUI();

  // Lucide icons
  document.addEventListener('DOMContentLoaded', function() {
    if (window.lucide) lucide.createIcons();
  });

  // Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(function() {});
    navigator.serviceWorker.addEventListener('message', function(e) {
      if (e.data && e.data.type === 'SW_UPDATED') {
        if (confirm('Dostupna nova verzia aplikacie. Obnovit teraz?')) {
          window.location.reload();
        }
      }
    });
    navigator.serviceWorker.addEventListener('controllerchange', function() {
      window.location.reload();
    });
  }
</script>
</body>
