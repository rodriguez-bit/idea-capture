<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ridea</title>
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#512D6D">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ridea">
<link rel="apple-touch-icon" href="/static/icon-192.png">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #512D6D; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; }

#rec-screen {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  flex-direction: column;
  padding: 18px 20px;
  padding-top: max(18px, env(safe-area-inset-top));
  padding-bottom: max(18px, env(safe-area-inset-bottom));
  gap: 10px;
  color: #f0e6f6;
  overflow-y: auto;
}

.topbar { display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
.uname { font-weight: 600; font-size: 15px; }
.btn-out { background: none; border: none; color: rgba(255,255,255,0.4); font-size: 12px; cursor: pointer; padding: 4px 8px; border-radius: 6px; }
.btn-out:hover { color: #ef4444; }

.sels { display: flex; gap: 8px; flex-shrink: 0; }
.sel {
  flex: 1; padding: 9px 10px;
  background: #3d1f54; border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px; color: #f0e6f6; font-size: 13px;
  outline: none; cursor: pointer; text-align: center;
}
.sel option { background: #3d1f54; color: #f0e6f6; }
.sel:focus { border-color: rgba(255,255,255,0.4); }

.vis-row { display: flex; gap: 6px; flex-shrink: 0; }
.vis-btn { flex: 1; padding: 7px 6px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; color: rgba(255,255,255,0.4); font-size: 12px; cursor: pointer; transition: all .15s; }
.vis-btn.active { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.3); color: #f0e6f6; }

.tab-row { display: flex; gap: 0; flex-shrink: 0; border-radius: 8px; overflow: hidden; border: 1px solid rgba(255,255,255,0.12); }
.tab-btn { flex: 1; padding: 8px 6px; background: rgba(255,255,255,0.04); border: none; color: rgba(255,255,255,0.4); font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s; }
.tab-btn.active { background: rgba(255,255,255,0.15); color: #f0e6f6; }

#voice-panel { display: none; flex-direction: column; align-items: center; justify-content: center; gap: 12px; flex: 1; min-height: 0; }
#voice-panel.active { display: flex; }
#text-panel { display: none; flex-direction: column; gap: 8px; flex: 1; min-height: 0; }
#text-panel.active { display: flex; }

.src-row { display: flex; gap: 6px; flex-shrink: 0; }
.src-btn { flex: 1; padding: 7px 6px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; color: rgba(255,255,255,0.4); font-size: 11px; cursor: pointer; transition: all .15s; text-align: center; }
.src-btn.active { background: rgba(168,75,47,0.3); border-color: rgba(239,68,68,0.4); color: #f0e6f6; }
.src-btn:hover { border-color: rgba(255,255,255,0.25); }

.mid { flex: 1; min-height: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; }
.rbtn {
  width: 88px; height: 88px; border-radius: 50%;
  border: 3px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.08);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: transform .15s;
}
.rbtn:hover { transform: scale(1.05); }
.rbtn.on { border-color: #ef4444; animation: g 1.5s infinite; }
@keyframes g { 0%{box-shadow:0 0 0 0 rgba(239,68,68,.4)} 70%{box-shadow:0 0 0 14px rgba(239,68,68,0)} 100%{box-shadow:0 0 0 0 rgba(239,68,68,0)} }
.rdot { width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.5); transition: all .15s; }
.rbtn.on .rdot { background: #ef4444; border-radius: 7px; width: 26px; height: 26px; }
.rtime { font-size: 30px; font-weight: 700; letter-spacing: 3px; }
.rhint { font-size: 12px; color: rgba(255,255,255,0.4); }

#visualizer { width: 100%; max-width: 280px; height: 48px; border-radius: 8px; display: none; }
#visualizer.active { display: block; }

.txt-area {
  flex: 1; min-height: 100px; padding: 12px; border-radius: 8px;
  background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.15);
  color: #f0e6f6; font-size: 14px; font-family: inherit; resize: none; outline: none;
}
.txt-area::placeholder { color: rgba(255,255,255,0.3); }
.txt-area:focus { border-color: rgba(255,255,255,0.4); }
.txt-send {
  padding: 12px; background: #fff; color: #512D6D; border: none;
  border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer;
}
.txt-send:hover { background: #f0e6f6; }
.txt-send:disabled { opacity: .5; cursor: not-allowed; }

.acts { display: flex; gap: 10px; flex-shrink: 0; }
.bsend { flex: 1; padding: 12px; background: #fff; color: #512D6D; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; }
.bsend:hover { background: #f0e6f6; }
.bsend:disabled { opacity: .5; cursor: not-allowed; }
.bx { padding: 12px 15px; background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.5); border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; font-size: 14px; cursor: pointer; }
.bx:hover { color: #f87171; border-color: #f87171; }

.bar { height: 3px; background: rgba(255,255,255,0.12); border-radius: 3px; flex-shrink: 0; }
.bfill { height: 100%; background: #d4a6f5; width: 0%; transition: width .3s; border-radius: 3px; }
.smsg { font-size: 12px; text-align: center; color: rgba(255,255,255,0.4); min-height: 16px; flex-shrink: 0; }
.smsg.ok { color: #4ade80; } .smsg.err { color: #f87171; } .smsg.inf { color: #d4a6f5; }
.adml { font-size: 11px; color: rgba(255,255,255,0.3); text-align: center; cursor: pointer; flex-shrink: 0; padding-bottom: 4px; }
.adml:hover { color: #d4a6f5; }
</style>
</head>
<body>

<div id="rec-screen">
  <div class="topbar">
    <span class="uname" id="uname">&#8212;</span>
    <button class="btn-out" onclick="doLogout()">Odhl&#225;si&#357;</button>
  </div>
  <div class="sels">
    <select class="sel" id="dept" onchange="localStorage.setItem('savedDept', this.value)">
      <option value="">Oddelenie</option>
      <option value="development">V&#253;voj</option>
      <option value="marketing">Marketing</option>
      <option value="production">Produkcia</option>
      <option value="management">Mana&#382;ment</option>
      <option value="other">In&#233;</option>
    </select>
    <select class="sel" id="role" onchange="localStorage.setItem('savedRole', this.value)">
      <option value="">Rola</option>
      <option value="c-level">C-level</option>
      <option value="manager">Mana&#382;&#233;r</option>
      <option value="employee">Zamestnanec</option>
    </select>
  </div>
  <div class="vis-row">
    <button type="button" class="vis-btn" id="vis-personal" onclick="setVisibility('personal')">M&#244;j n&#225;pad</button>
    <button type="button" class="vis-btn active" id="vis-company" onclick="setVisibility('company')">Pre cel&#250; firmu</button>
  </div>

  <div class="tab-row">
    <button type="button" class="tab-btn active" id="tab-voice" onclick="switchTab('voice')">Hlasov&#253; n&#225;pad</button>
    <button type="button" class="tab-btn" id="tab-text" onclick="switchTab('text')">Textov&#253; n&#225;pad</button>
  </div>

  <div id="voice-panel" class="active">
    <div class="src-row" id="src-row">
      <button type="button" class="src-btn active" id="src-mic" onclick="setAudioSource('mic')">&#127908; Mikrof&#243;n</button>
      <button type="button" class="src-btn" id="src-system" onclick="setAudioSource('system')">&#128187; Syst&#233;mov&#253; zvuk</button>
    </div>
    <canvas id="visualizer"></canvas>
    <button class="rbtn" id="rbtn" onclick="toggleRecord()"><div class="rdot"></div></button>
    <div class="rtime" id="rtime">&#8212;</div>
    <div class="rhint" id="rhint">Klikni pre nahr&#225;vanie</div>
  </div>

  <div id="text-panel">
    <textarea class="txt-area" id="txtIdea" placeholder="Nap&#237;&#353;te svoj n&#225;pad..."></textarea>
    <button class="txt-send" id="txtSend" onclick="sendTextIdea()">Odosla&#357; textov&#253; n&#225;pad</button>
  </div>

  <div class="acts" id="acts" style="display:none">
    <button class="bx" onclick="discardRecording()">&#10005;</button>
    <button class="bsend" id="bsend" onclick="submitIdea()">Odosla&#357; n&#225;pad</button>
  </div>
  <div class="bar"><div class="bfill" id="bfill"></div></div>
  <div class="smsg" id="smsg"></div>
  <div class="adml" onclick="openAdmin()">&#9881; Admin konzola</div>
</div>

<script>
const API_BASE = window.API_BASE || '';
let mediaRecorder = null;
let audioChunks = [];
let audioBlob = null;
let timerInterval = null;
let seconds = 0;
let currentUser = null;
let currentVisibility = 'company';
let audioSource = 'mic';
let audioContext = null;
let analyser = null;
let animFrameId = null;
let activeStream = null;

function switchTab(tab) {
  document.getElementById('tab-voice').classList.toggle('active', tab === 'voice');
  document.getElementById('tab-text').classList.toggle('active', tab === 'text');
  document.getElementById('voice-panel').classList.toggle('active', tab === 'voice');
  document.getElementById('text-panel').classList.toggle('active', tab === 'text');
}

function setVisibility(val) {
  currentVisibility = val;
  document.getElementById('vis-personal').classList.toggle('active', val === 'personal');
  document.getElementById('vis-company').classList.toggle('active', val === 'company');
}

function setAudioSource(src) {
  audioSource = src;
  document.getElementById('src-mic').classList.toggle('active', src === 'mic');
  document.getElementById('src-system').classList.toggle('active', src === 'system');
}

async function init() {
  try {
    const r = await fetch(API_BASE + '/api/current-user', { credentials: 'include' });
    if (!r.ok) { window.location.href = '/login'; return; }
    currentUser = await r.json();
    document.getElementById('uname').textContent = currentUser.name;
    var savedDept = localStorage.getItem('savedDept') || currentUser.department || '';
    var savedRole = localStorage.getItem('savedRole') || '';
    if (savedDept) document.getElementById('dept').value = savedDept;
    if (savedRole) document.getElementById('role').value = savedRole;
  } catch(e) {
    setMsg('Chyba pripojenia k serveru', 'err');
  }
  // Check if getDisplayMedia is available
  if (!navigator.mediaDevices.getDisplayMedia) {
    document.getElementById('src-row').style.display = 'none';
  }
}

async function doLogout() {
  try { await fetch(API_BASE + '/api/logout', { method: 'POST', credentials: 'include' }); } catch(e) {}
  window.location.href = '/login';
}

function openAdmin() {
  window.location.href = '/admin';
}

// ── Visualizer ──
function startVisualizer(stream) {
  var canvas = document.getElementById('visualizer');
  canvas.classList.add('active');
  var ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth * 2;
  canvas.height = canvas.offsetHeight * 2;

  audioContext = new (window.AudioContext || window.webkitAudioContext)();
  var source = audioContext.createMediaStreamSource(stream);
  analyser = audioContext.createAnalyser();
  analyser.fftSize = 128;
  source.connect(analyser);

  var bufLen = analyser.frequencyBinCount;
  var data = new Uint8Array(bufLen);
  var barW = canvas.width / bufLen;

  function draw() {
    animFrameId = requestAnimationFrame(draw);
    analyser.getByteFrequencyData(data);
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (var i = 0; i < bufLen; i++) {
      var v = data[i] / 255;
      var h = v * canvas.height;
      var x = i * barW;
      // Purple gradient bars
      var r = 180 + Math.round(v * 59);
      var g = 75 - Math.round(v * 30);
      var b = 213 + Math.round(v * 42);
      ctx.fillStyle = 'rgba(' + r + ',' + g + ',' + b + ',' + (0.5 + v * 0.5) + ')';
      ctx.fillRect(x, canvas.height - h, barW - 1, h);
    }
  }
  draw();
}

function stopVisualizer() {
  if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }
  if (audioContext) { audioContext.close().catch(function(){}); audioContext = null; }
  var canvas = document.getElementById('visualizer');
  canvas.classList.remove('active');
  var ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

// ── Recording ──
async function toggleRecord() {
  if (mediaRecorder && mediaRecorder.state === 'recording') stopRecording();
  else await startRecording();
}

async function startRecording() {
  var dept = document.getElementById('dept').value;
  var role = document.getElementById('role').value;
  if (!dept || !role) { setMsg('Vyber oddelenie a rolu', 'err'); return; }
  try {
    var stream;
    if (audioSource === 'system') {
      try {
        var displayStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
        var audioTracks = displayStream.getAudioTracks();
        if (audioTracks.length === 0) {
          displayStream.getTracks().forEach(function(t) { t.stop(); });
          setMsg('Zdie\u013Eanie zvuku nebolo povolen\u00E9. Skontroluj nastavenia.', 'err');
          return;
        }
        // Stop video track, keep only audio
        displayStream.getVideoTracks().forEach(function(t) { t.stop(); });
        stream = new MediaStream(audioTracks);
      } catch(e) {
        if (e.name === 'NotAllowedError') {
          setMsg('Zdie\u013Eanie obrazovky odmietnut\u00E9', 'err');
        } else {
          setMsg('Chyba: ' + e.message, 'err');
        }
        return;
      }
    } else {
      stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    }
    activeStream = stream;
    audioChunks = [];
    var mime = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : 'audio/webm';
    mediaRecorder = new MediaRecorder(stream, { mimeType: mime });
    mediaRecorder.ondataavailable = function(e) { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = function() {
      audioBlob = new Blob(audioChunks, { type: mime });
      stream.getTracks().forEach(function(t) { t.stop(); });
      stopVisualizer();
      document.getElementById('acts').style.display = 'flex';
      document.getElementById('rhint').textContent = 'Nahr\u00E1vka pripraven\u00E1';
    };
    mediaRecorder.start(1000);
    startVisualizer(stream);
    document.getElementById('rbtn').classList.add('on');
    document.getElementById('rhint').textContent = 'Nahr\u00E1vam... klikni pre zastavenie';
    document.getElementById('acts').style.display = 'none';
    seconds = 0;
    document.getElementById('rtime').textContent = '0:00';
    timerInterval = setInterval(function() {
      seconds++;
      var m = Math.floor(seconds / 60), s = seconds % 60;
      document.getElementById('rtime').textContent = m + ':' + (s < 10 ? '0' : '') + s;
    }, 1000);
    clearMsg();
  } catch(e) {
    setMsg(e.name === 'NotAllowedError' ? 'Mikrof\u00F3n odmietnut\u00FD' : 'Chyba: ' + e.message, 'err');
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  clearInterval(timerInterval);
  document.getElementById('rbtn').classList.remove('on');
}

function discardRecording() {
  audioBlob = null; audioChunks = [];
  if (activeStream) { activeStream.getTracks().forEach(function(t) { t.stop(); }); activeStream = null; }
  stopVisualizer();
  document.getElementById('acts').style.display = 'none';
  document.getElementById('rbtn').classList.remove('on');
  document.getElementById('rtime').textContent = '\u2014';
  document.getElementById('rhint').textContent = 'Klikni pre nahr\u00E1vanie';
  clearMsg();
}

async function submitIdea() {
  if (!audioBlob) return;
  var dept = document.getElementById('dept').value;
  var role = document.getElementById('role').value;
  if (!dept || !role) { setMsg('Vyber oddelenie a rolu', 'err'); return; }
  var btn = document.getElementById('bsend');
  btn.disabled = true; btn.textContent = 'Odosiela sa...';
  setMsg('Nahr\u00E1vam s\u00FAbor...', 'inf');
  var fill = document.getElementById('bfill');
  fill.style.width = '15%';
  try {
    var ext = audioBlob.type.indexOf('ogg') >= 0 ? 'ogg' : audioBlob.type.indexOf('mp4') >= 0 ? 'mp4' : 'webm';
    var fd = new FormData();
    fd.append('audio', audioBlob, 'idea_' + Date.now() + '.' + ext);
    fd.append('department', dept);
    fd.append('role', role);
    fd.append('visibility', currentVisibility);
    var r = await fetch(API_BASE + '/api/ideas/upload', { method: 'POST', body: fd, credentials: 'include' });
    if (!r.ok) {
      var d = await r.json().catch(function() { return {}; });
      setMsg(d.error || 'Chyba', 'err');
      btn.disabled = false; btn.textContent = 'Odosla\u0165 n\u00E1pad';
      fill.style.width = '0%';
      return;
    }
    var data = await r.json();
    if (data.job_id) {
      setMsg('Prep\u00EDsujem... 10\u201330 sek\u00FAnd', 'inf');
      fill.style.width = '40%';
      await pollJob(data.job_id, fill, btn);
    } else {
      fill.style.width = '100%';
      setMsg('\u2713 N\u00E1pad odoslan\u00FD!', 'ok');
      setTimeout(function() { discardRecording(); fill.style.width = '0%'; }, 2500);
      btn.disabled = false; btn.textContent = 'Odosla\u0165 n\u00E1pad';
    }
  } catch(e) {
    setMsg('Chyba: ' + e.message, 'err');
    btn.disabled = false; btn.textContent = 'Odosla\u0165 n\u00E1pad';
    fill.style.width = '0%';
  }
}

async function sendTextIdea() {
  var text = document.getElementById('txtIdea').value.trim();
  if (!text) { setMsg('Nap\u00ED\u0161te text n\u00E1padu', 'err'); return; }
  var dept = document.getElementById('dept').value;
  var role = document.getElementById('role').value;
  if (!dept || !role) { setMsg('Vyber oddelenie a rolu', 'err'); return; }
  var btn = document.getElementById('txtSend');
  btn.disabled = true; btn.textContent = 'Odosiela sa...';
  var fill = document.getElementById('bfill');
  var w = 0;
  var p = setInterval(function() { w = Math.min(w + 5, 85); fill.style.width = w + '%'; if (w >= 85) clearInterval(p); }, 300);
  try {
    var r = await fetch(API_BASE + '/api/ideas/text', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: text, department: dept, role: role, visibility: currentVisibility }),
      credentials: 'include'
    });
    clearInterval(p); fill.style.width = '100%';
    if (r.ok) {
      setMsg('\u2713 Textov\u00FD n\u00E1pad odoslan\u00FD!', 'ok');
      document.getElementById('txtIdea').value = '';
      setTimeout(function() { fill.style.width = '0%'; clearMsg(); }, 2500);
    } else {
      var d = await r.json().catch(function() { return {}; });
      setMsg(d.error || 'Chyba', 'err');
    }
  } catch(e) {
    clearInterval(p);
    setMsg('Chyba: ' + e.message, 'err');
  }
  finally { btn.disabled = false; btn.textContent = 'Odosla\u0165 textov\u00FD n\u00E1pad'; setTimeout(function() { fill.style.width = '0%'; }, 2000); }
}

async function pollJob(jobId, fill, btn) {
  var attempts = 0;
  while (attempts < 60) {
    await new Promise(function(r) { setTimeout(r, 3000); });
    attempts++;
    try {
      var r = await fetch(API_BASE + '/api/ideas/job/' + jobId, { credentials: 'include' });
      if (r.status === 202) {
        fill.style.width = Math.min(40 + attempts * 2, 90) + '%';
        continue;
      }
      if (r.ok) {
        fill.style.width = '100%';
        setMsg('\u2713 N\u00E1pad odoslan\u00FD!', 'ok');
        setTimeout(function() { discardRecording(); fill.style.width = '0%'; }, 2500);
      } else if (r.status === 404) {
        fill.style.width = '100%';
        setMsg('\u2713 N\u00E1pad spracovan\u00FD!', 'ok');
        setTimeout(function() { discardRecording(); fill.style.width = '0%'; }, 2500);
      } else {
        var d = await r.json().catch(function() { return {}; });
        setMsg(d.error || 'Chyba pri spracovan\u00ED', 'err');
        fill.style.width = '0%';
      }
      break;
    } catch(e) {
      continue;
    }
  }
  if (attempts >= 60) {
    setMsg('Timeout \u2014 sk\u00FAs znova', 'err');
    fill.style.width = '0%';
  }
  btn.disabled = false; btn.textContent = 'Odosla\u0165 n\u00E1pad';
}

function setMsg(t, c) { var e = document.getElementById('smsg'); e.textContent = t; e.className = 'smsg ' + c; }
function clearMsg() { var e = document.getElementById('smsg'); e.textContent = ''; e.className = 'smsg'; }

init();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(function() {});
  navigator.serviceWorker.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'SW_UPDATED') {
      if (confirm('Dostupn\u00E1 nov\u00E1 verzia aplik\u00E1cie. Obnovi\u0165 teraz?')) window.location.reload();
    }
  });
  navigator.serviceWorker.addEventListener('controllerchange', function() { window.location.reload(); });
}
</script>
</body>
</html>
