<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ridea — Nahrať nápad</title>
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#0f172a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ridea">
<link rel="apple-touch-icon" href="/static/icon-192.png">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f172a; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; }

#rec-screen {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  flex-direction: column;
  padding: 18px 20px;
  padding-top: max(18px, env(safe-area-inset-top));
  padding-bottom: max(18px, env(safe-area-inset-bottom));
  gap: 12px;
  color: #e2e8f0;
}

.topbar { display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
.uname { font-weight: 600; font-size: 15px; }
.btn-out { background: none; border: none; color: #64748b; font-size: 12px; cursor: pointer; padding: 4px 8px; border-radius: 6px; }
.btn-out:hover { color: #ef4444; }

.sels { display: flex; gap: 8px; flex-shrink: 0; }
.sel {
  flex: 1; padding: 9px 10px;
  background: #1e293b; border: 1px solid #334155;
  border-radius: 8px; color: #e2e8f0; font-size: 13px;
  outline: none; appearance: none; cursor: pointer; text-align: center;
}
.sel:focus { border-color: #6366f1; }

.mid { flex: 1; min-height: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; }
.rbtn {
  width: 88px; height: 88px; border-radius: 50%;
  border: 3px solid #6366f1; background: #1e293b;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: transform .15s;
}
.rbtn:hover { transform: scale(1.05); }
.rbtn.on { border-color: #ef4444; animation: g 1.5s infinite; }
@keyframes g { 0%{box-shadow:0 0 0 0 rgba(239,68,68,.4)} 70%{box-shadow:0 0 0 14px rgba(239,68,68,0)} 100%{box-shadow:0 0 0 0 rgba(239,68,68,0)} }
.rdot { width: 32px; height: 32px; border-radius: 50%; background: #6366f1; transition: all .15s; }
.rbtn.on .rdot { background: #ef4444; border-radius: 7px; width: 26px; height: 26px; }
.rtime { font-size: 30px; font-weight: 700; letter-spacing: 3px; }
.rhint { font-size: 12px; color: #64748b; }

.vis-row { display: flex; gap: 6px; flex-shrink: 0; }
.vis-btn { flex: 1; padding: 7px 6px; background: #1e293b; border: 1px solid #334155; border-radius: 8px; color: #64748b; font-size: 12px; cursor: pointer; transition: all .15s; }
.vis-btn.active { background: rgba(99,102,241,0.15); border-color: #6366f1; color: #e2e8f0; }

.acts { display: flex; gap: 10px; flex-shrink: 0; }
.bsend { flex: 1; padding: 12px; background: #22c55e; color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; }
.bsend:hover { background: #16a34a; }
.bsend:disabled { opacity: .5; cursor: not-allowed; }
.bx { padding: 12px 15px; background: #1e293b; color: #64748b; border: 1px solid #334155; border-radius: 10px; font-size: 14px; cursor: pointer; }
.bx:hover { color: #ef4444; border-color: #ef4444; }

.bar { height: 3px; background: #334155; border-radius: 3px; flex-shrink: 0; }
.bfill { height: 100%; background: #6366f1; width: 0%; transition: width .3s; border-radius: 3px; }
.smsg { font-size: 12px; text-align: center; color: #64748b; min-height: 16px; flex-shrink: 0; }
.smsg.ok { color: #22c55e; } .smsg.err { color: #ef4444; } .smsg.inf { color: #818cf8; }
.adml { font-size: 11px; color: #475569; text-align: center; cursor: pointer; flex-shrink: 0; padding-bottom: 4px; }
.adml:hover { color: #6366f1; }
</style>
</head>
<body>

<div id="rec-screen">
  <div class="topbar">
    <span class="uname" id="uname">—</span>
    <button class="btn-out" onclick="doLogout()">Odhlásiť</button>
  </div>
  <div class="sels">
    <select class="sel" id="dept" onchange="localStorage.setItem('savedDept', this.value)">
      <option value="">Oddelenie</option>
      <option value="development">Vývoj</option>
      <option value="marketing">Marketing</option>
      <option value="production">Produkcia</option>
      <option value="management">Manažment</option>
      <option value="other">Iné</option>
    </select>
    <select class="sel" id="role" onchange="localStorage.setItem('savedRole', this.value)">
      <option value="">Rola</option>
      <option value="c-level">C-level</option>
      <option value="manager">Manažér</option>
      <option value="employee">Zamestnanec</option>
      <option value="majo-markech">Majo markech je kral</option>
    </select>
  </div>
  <div class="vis-row">
    <button type="button" class="vis-btn active" id="vis-personal" onclick="setVisibility('personal')">🔒 Môj nápad</button>
    <button type="button" class="vis-btn" id="vis-company" onclick="setVisibility('company')">🌐 Pre celú firmu</button>
  </div>
  <div class="mid">
    <button class="rbtn" id="rbtn" onclick="toggleRecord()"><div class="rdot"></div></button>
    <div class="rtime" id="rtime">—</div>
    <div class="rhint" id="rhint">Klikni pre nahrávanie</div>
  </div>
  <div class="acts" id="acts" style="display:none">
    <button class="bx" onclick="discardRecording()">✕</button>
    <button class="bsend" id="bsend" onclick="submitIdea()">Odoslať nápad</button>
  </div>
  <div class="bar"><div class="bfill" id="bfill"></div></div>
  <div class="smsg" id="smsg"></div>
  <div class="adml" onclick="openAdmin()">⚙ Admin konzola</div>
</div>

<script>
const API_BASE = window.API_BASE || '';
let mediaRecorder = null;
let audioChunks = [];
let audioBlob = null;
let timerInterval = null;
let seconds = 0;
let currentUser = null;
let currentVisibility = 'personal';

function setVisibility(val) {
  currentVisibility = val;
  document.getElementById('vis-personal').classList.toggle('active', val === 'personal');
  document.getElementById('vis-company').classList.toggle('active', val === 'company');
}

async function init() {
  try {
    const r = await fetch(`${API_BASE}/api/current-user`, { credentials: 'include' });
    if (!r.ok) { window.location.href = '/login'; return; }
    currentUser = await r.json();
    document.getElementById('uname').textContent = currentUser.name;
    const savedDept = localStorage.getItem('savedDept') || currentUser.department || '';
    const savedRole = localStorage.getItem('savedRole') || '';
    if (savedDept) document.getElementById('dept').value = savedDept;
    if (savedRole) document.getElementById('role').value = savedRole;
  } catch(e) {
    setMsg('Chyba pripojenia k serveru', 'err');
  }
}

async function doLogout() {
  try { await fetch(`${API_BASE}/api/logout`, { method: 'POST', credentials: 'include' }); } catch(e) {}
  window.location.href = '/login';
}

function openAdmin() {
  window.location.href = '/';
}

async function toggleRecord() {
  if (mediaRecorder && mediaRecorder.state === 'recording') stopRecording();
  else await startRecording();
}

async function startRecording() {
  const dept = document.getElementById('dept').value;
  const role = document.getElementById('role').value;
  if (!dept || !role) { setMsg('Vyber oddelenie a rolu', 'err'); return; }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];
    const mime = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : 'audio/webm';
    mediaRecorder = new MediaRecorder(stream, { mimeType: mime });
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      audioBlob = new Blob(audioChunks, { type: mime });
      stream.getTracks().forEach(t => t.stop());
      document.getElementById('acts').style.display = 'flex';
      document.getElementById('rhint').textContent = 'Nahrávka pripravená';
    };
    mediaRecorder.start(1000);
    document.getElementById('rbtn').classList.add('on');
    document.getElementById('rhint').textContent = 'Nahrávam... klikni pre zastavenie';
    document.getElementById('acts').style.display = 'none';
    seconds = 0;
    document.getElementById('rtime').textContent = '0:00';
    timerInterval = setInterval(() => {
      seconds++;
      const m = Math.floor(seconds / 60), s = seconds % 60;
      document.getElementById('rtime').textContent = `${m}:${s < 10 ? '0' : ''}${s}`;
    }, 1000);
    clearMsg();
  } catch(e) {
    setMsg(e.name === 'NotAllowedError' ? 'Mikrofón odmietnutý' : 'Chyba: ' + e.message, 'err');
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  clearInterval(timerInterval);
  document.getElementById('rbtn').classList.remove('on');
}

function discardRecording() {
  audioBlob = null; audioChunks = [];
  document.getElementById('acts').style.display = 'none';
  document.getElementById('rbtn').classList.remove('on');
  document.getElementById('rtime').textContent = '—';
  document.getElementById('rhint').textContent = 'Klikni pre nahrávanie';
  clearMsg();
}

async function submitIdea() {
  if (!audioBlob) return;
  const dept = document.getElementById('dept').value;
  const role = document.getElementById('role').value;
  if (!dept || !role) { setMsg('Vyber oddelenie a rolu', 'err'); return; }
  const btn = document.getElementById('bsend');
  btn.disabled = true; btn.textContent = 'Odosiela sa...';
  setMsg('Prepísujem... 10–30 sekúnd', 'inf');
  const fill = document.getElementById('bfill');
  let w = 0;
  const p = setInterval(() => { w = Math.min(w + 2, 85); fill.style.width = w + '%'; if (w >= 85) clearInterval(p); }, 600);
  try {
    const ext = audioBlob.type.includes('ogg') ? 'ogg' : audioBlob.type.includes('mp4') ? 'mp4' : 'webm';
    const fd = new FormData();
    fd.append('audio', audioBlob, `idea_${Date.now()}.${ext}`);
    fd.append('department', dept);
    fd.append('role', role);
    fd.append('visibility', currentVisibility);
    const r = await fetch(`${API_BASE}/api/ideas/upload`, { method: 'POST', body: fd, credentials: 'include' });
    clearInterval(p); fill.style.width = '100%';
    if (r.ok) {
      const d = await r.json();
      setMsg('✓ Nápad odoslaný!', 'ok');
      setTimeout(() => { discardRecording(); fill.style.width = '0%'; }, 2500);
    } else {
      const d = await r.json().catch(() => ({}));
      setMsg(d.error || 'Chyba', 'err');
    }
  } catch(e) {
    setMsg('Chyba: ' + e.message, 'err');
  } finally {
    btn.disabled = false; btn.textContent = 'Odoslať nápad';
    setTimeout(() => { fill.style.width = '0%'; }, 2000);
  }
}

function setMsg(t, c) { const e = document.getElementById('smsg'); e.textContent = t; e.className = 'smsg ' + c; }
function clearMsg() { const e = document.getElementById('smsg'); e.textContent = ''; e.className = 'smsg'; }

init();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
  navigator.serviceWorker.addEventListener('message', e => {
    if (e.data?.type === 'SW_UPDATED') {
      if (confirm('Dostupná nová verzia aplikácie. Obnoviť teraz?')) window.location.reload();
    }
  });
  navigator.serviceWorker.addEventListener('controllerchange', () => { window.location.reload(); });
}
</script>
</body>
</html>
