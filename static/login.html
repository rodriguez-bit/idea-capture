<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ridea — Prihlasenie</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111827;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }
    .login-wrap { width: 100%; max-width: 24rem; }
    .logo-area { text-align: center; margin-bottom: 2rem; }
    .logo-icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 4rem; height: 4rem; background: #2563eb; border-radius: 1rem; margin-bottom: 1rem;
    }
    .logo-area h1 { font-size: 1.5rem; font-weight: 700; color: #fff; }
    .logo-area p { color: #9ca3af; font-size: 0.875rem; margin-top: 0.25rem; }
    .card {
      background: #1f2937; border-radius: 1rem; padding: 1.5rem;
      box-shadow: 0 25px 50px rgba(0,0,0,0.25); border: 1px solid #374151;
    }
    .form-group { margin-bottom: 1rem; }
    .form-group label {
      display: block; font-size: 0.875rem; font-weight: 500;
      color: #d1d5db; margin-bottom: 0.375rem;
    }
    .form-group input {
      width: 100%; padding: 0.625rem 0.75rem; background: #374151;
      border: 1px solid #4b5563; border-radius: 0.5rem; color: #fff;
      font-size: 0.875rem; outline: none; transition: all 150ms;
    }
    .form-group input::placeholder { color: #6b7280; }
    .form-group input:focus {
      border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.3);
    }
    .btn {
      width: 100%; padding: 0.625rem; background: #2563eb; color: #fff;
      border: none; border-radius: 0.5rem; font-size: 0.875rem;
      font-weight: 600; cursor: pointer; transition: background 150ms;
      display: flex; align-items: center; justify-content: center;
    }
    .btn:hover { background: #1d4ed8; }
    .error-box {
      display: none; background: rgba(127,29,29,0.5); border: 1px solid #b91c1c;
      color: #fca5a5; font-size: 0.8125rem; padding: 0.5rem 0.75rem;
      border-radius: 0.5rem; margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="logo-area">
      <div class="logo-icon">
        <i data-lucide="lightbulb" style="width:2rem;height:2rem;color:white;"></i>
      </div>
      <h1>Ridea</h1>
      <p>Interny nastroj pre zachytavanie napadov</p>
    </div>

    <div class="card">
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" id="email" placeholder="vas@email.com" autofocus>
      </div>
      <div class="form-group">
        <label>Heslo</label>
        <input type="password" id="password" placeholder="••••••••">
      </div>
      <div id="error" class="error-box"></div>
      <button class="btn" onclick="doLogin()">Prihlasit sa</button>
    </div>
  </div>

  <script>
    lucide.createIcons();

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doLogin();
    });

    async function doLogin() {
      var email = document.getElementById('email').value.trim();
      var password = document.getElementById('password').value;
      var err = document.getElementById('error');
      err.style.display = 'none';

      try {
        var r = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email, password: password })
        });
        if (r.ok) {
          var params = new URLSearchParams(window.location.search);
          window.location.href = params.get('next') || '/recorder';
        } else {
          var d = await r.json();
          err.textContent = d.error || 'Nespravne prihlasovacie udaje';
          err.style.display = 'block';
        }
      } catch (e) {
        err.textContent = 'Chyba spojenia so serverom';
        err.style.display = 'block';
      }
    }
  </script>
</body>
</html>
