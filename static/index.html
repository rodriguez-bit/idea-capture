<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ridea — Admin Konzola</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f172a; --surface: #1e293b; --surface2: #263348;
  --border: #334155; --text: #e2e8f0; --muted: #94a3b8;
  --primary: #6366f1; --primary-hover: #4f46e5;
  --green: #22c55e; --yellow: #eab308; --red: #ef4444; --blue: #3b82f6;
}
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

/* NAV */
nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; gap: 16px; height: 56px; position: sticky; top: 0; z-index: 100; }
.nav-logo { font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.nav-logo span { color: var(--primary); }
.nav-links { display: flex; gap: 4px; }
.nav-link { padding: 6px 14px; border-radius: 8px; font-size: 14px; cursor: pointer; color: var(--muted); border: none; background: transparent; }
.nav-link:hover, .nav-link.active { background: var(--surface2); color: var(--text); }
.nav-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
.user-badge { font-size: 13px; color: var(--muted); }
.btn-sm { padding: 6px 14px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; }
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-hover); }
.btn-ghost { background: var(--surface2); color: var(--text); }
.btn-ghost:hover { background: var(--border); }

/* MAIN */
main { flex: 1; padding: 24px; max-width: 1400px; width: 100%; margin: 0 auto; }

/* PAGES */
.page { display: none; }
.page.active { display: block; }

/* STATS CARDS */
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
.stat-value { font-size: 32px; font-weight: 700; }
.stat-label { font-size: 13px; color: var(--muted); margin-top: 4px; }
.stat-card.green .stat-value { color: var(--green); }
.stat-card.yellow .stat-value { color: var(--yellow); }
.stat-card.red .stat-value { color: var(--red); }
.stat-card.blue .stat-value { color: var(--blue); }

/* FILTERS BAR */
.filters { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
.filter-select, .filter-input { padding: 8px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; outline: none; }
.filter-select:focus, .filter-input:focus { border-color: var(--primary); }
.filter-input { flex: 1; min-width: 200px; }

/* IDEAS TABLE */
.table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
table { width: 100%; border-collapse: collapse; }
th { padding: 12px 16px; text-align: left; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid var(--border); background: var(--surface2); }
td { padding: 12px 16px; font-size: 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--surface2); cursor: pointer; }
.truncate { max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* BADGES */
.badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
.badge-new { background: rgba(59,130,246,0.15); color: #60a5fa; }
.badge-in_review { background: rgba(234,179,8,0.15); color: #facc15; }
.badge-accepted { background: rgba(34,197,94,0.15); color: #4ade80; }
.badge-rejected { background: rgba(239,68,68,0.15); color: #f87171; }
.badge-dept { background: var(--surface2); color: var(--muted); }
.badge-score { background: rgba(99,102,241,0.15); color: #818cf8; }
.badge-tag { background: rgba(168,85,247,0.15); color: #c084fc; font-size: 11px; }
.tag-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
.tag-chip { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; background: rgba(168,85,247,0.1); border: 1px solid rgba(168,85,247,0.25); border-radius: 20px; font-size: 12px; color: #c084fc; cursor: pointer; transition: all 0.15s; }
.tag-chip:hover, .tag-chip.selected { background: rgba(168,85,247,0.3); border-color: rgba(168,85,247,0.6); }
.tag-chip .tag-x { opacity: 0.6; font-size: 11px; margin-left: 2px; }
.tag-chip .tag-x:hover { opacity: 1; }
.tag-add-row { display: flex; gap: 8px; margin-top: 8px; }
.tag-add-input { flex: 1; padding: 7px 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; outline: none; }
.tag-add-input:focus { border-color: rgba(168,85,247,0.5); }

/* MODAL */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 32px; width: 100%; max-width: 680px; max-height: 90vh; overflow-y: auto; position: relative; }
.modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
.modal-close { position: absolute; top: 16px; right: 16px; background: var(--surface2); border: none; color: var(--muted); width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
.modal-close:hover { color: var(--text); }

/* DETAIL */
.detail-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
.detail-section { margin-bottom: 20px; }
.detail-section label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; display: block; margin-bottom: 6px; }
.detail-section p, .detail-section .text-block { font-size: 14px; line-height: 1.6; color: var(--text); background: var(--surface2); border-radius: 8px; padding: 12px; }
.detail-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); }
.detail-actions select, .detail-actions textarea { padding: 8px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; outline: none; }
.detail-actions select:focus, .detail-actions textarea:focus { border-color: var(--primary); }
.detail-actions textarea { width: 100%; resize: vertical; min-height: 72px; }
.ai-analysis { background: var(--surface2); border-radius: 8px; padding: 16px; }
.ai-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; }
.ai-list { padding-left: 16px; font-size: 14px; color: var(--muted); }
.ai-list li { margin-bottom: 4px; }

/* USERS PAGE */
.users-grid { display: grid; gap: 12px; }
.user-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; display: flex; align-items: center; gap: 16px; }
.user-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; flex-shrink: 0; }
.user-info { flex: 1; }
.user-name { font-weight: 600; }
.user-email { font-size: 13px; color: var(--muted); }
.user-actions { display: flex; gap: 8px; }

/* FORM */
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 6px; }
.form-group input, .form-group select { width: 100%; padding: 10px 14px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; outline: none; }
.form-group input:focus, .form-group select:focus { border-color: var(--primary); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

/* SECTION HEADER */
.section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.section-header h2 { font-size: 20px; font-weight: 700; }
.section-header .ml-auto { margin-left: auto; }

/* EMPTY */
.empty { text-align: center; padding: 64px 24px; color: var(--muted); }
.empty .icon { font-size: 48px; margin-bottom: 12px; }
.empty p { font-size: 15px; }

/* TOAST */
.toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 20px; font-size: 14px; z-index: 999; transform: translateY(100px); opacity: 0; transition: all 0.3s; max-width: 340px; }
.toast.show { transform: translateY(0); opacity: 1; }
.toast.success { border-color: var(--green); color: var(--green); }
.toast.error { border-color: var(--red); color: var(--red); }

/* PAGINATION */
.pagination { display: flex; align-items: center; gap: 8px; margin-top: 16px; justify-content: flex-end; }
.pagination button { padding: 6px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text); cursor: pointer; font-size: 14px; }
.pagination button:disabled { opacity: 0.4; cursor: default; }
.pagination button.active { background: var(--primary); border-color: var(--primary); }
.pagination span { font-size: 13px; color: var(--muted); }
</style>
</head>
<body>

<nav>
  <div class="nav-logo">💡 <span>Ri</span>dea</div>
  <div class="nav-links">
    <button class="nav-link active" onclick="showPage('ideas')">Nápady</button>
    <button class="nav-link" onclick="showPage('stats')">Štatistiky</button>
    <button class="nav-link" id="nav-users" style="display:none" onclick="showPage('users')">Používatelia</button>
  </div>
  <div class="nav-right">
    <span class="user-badge" id="user-badge"></span>
    <a href="/recorder" target="_blank"><button class="btn-sm btn-primary">+ Nahrať nápad</button></a>
    <button class="btn-sm btn-ghost" onclick="doLogout()">Odhlásiť</button>
  </div>
</nav>

<main>
  <!-- IDEAS PAGE -->
  <div class="page active" id="page-ideas">
    <div class="filters">
      <select class="filter-select" id="f-status" onchange="loadIdeas()">
        <option value="">Všetky statusy</option>
        <option value="new">Nové</option>
        <option value="in_review">V prehliadke</option>
        <option value="accepted">Prijaté</option>
        <option value="rejected">Zamietnuté</option>
      </select>
      <select class="filter-select" id="f-dept" onchange="loadIdeas()">
        <option value="">Všetky oddelenia</option>
        <option value="development">Vývoj</option>
        <option value="marketing">Marketing</option>
        <option value="production">Produkcia</option>
        <option value="management">Manažment</option>
        <option value="other">Iné</option>
      </select>
      <select class="filter-select" id="f-role" onchange="loadIdeas()">
        <option value="">Všetky roly</option>
        <option value="c-level">C-level</option>
        <option value="manager">Manažér</option>
        <option value="employee">Zamestnanec</option>
        <option value="majo-markech">Majo markech je kral</option>
      </select>
      <input class="filter-input" id="f-search" type="search" placeholder="Hľadať v transkripte..." oninput="debounceSearch()" autocomplete="new-password" data-lpignore="true">
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Autor</th>
            <th>Oddelenie</th>
            <th>Rola</th>
            <th>Transkript</th>
            <th>AI</th>
            <th>Tagy</th>
            <th>Status</th>
            <th>Viditeľnosť</th>
            <th>Dátum</th>
          </tr>
        </thead>
        <tbody id="ideas-tbody">
          <tr><td colspan="8" style="text-align:center;padding:40px;color:var(--muted)">Načítavanie...</td></tr>
        </tbody>
      </table>
    </div>
    <div class="pagination" id="pagination"></div>
  </div>

  <!-- STATS PAGE -->
  <div class="page" id="page-stats">
    <div class="stats-grid" id="stats-grid">
      <div class="stat-card"><div class="stat-value" id="s-total">—</div><div class="stat-label">Celkovo nápadov</div></div>
      <div class="stat-card green"><div class="stat-value" id="s-accepted">—</div><div class="stat-label">Prijaté</div></div>
      <div class="stat-card yellow"><div class="stat-value" id="s-review">—</div><div class="stat-label">V prehliadke</div></div>
      <div class="stat-card blue"><div class="stat-value" id="s-new">—</div><div class="stat-label">Nové</div></div>
      <div class="stat-card red"><div class="stat-value" id="s-rejected">—</div><div class="stat-label">Zamietnuté</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:8px">
      <div class="table-wrap" style="padding:20px">
        <h3 style="font-size:15px;font-weight:600;margin-bottom:14px">Podľa oddelenia</h3>
        <div id="dept-stats"></div>
      </div>
      <div class="table-wrap" style="padding:20px">
        <h3 style="font-size:15px;font-weight:600;margin-bottom:14px">Posledné nápady</h3>
        <div id="recent-ideas"></div>
      </div>
    </div>
  </div>

  <!-- USERS PAGE -->
  <div class="page" id="page-users">
    <div class="section-header">
      <h2>Používatelia</h2>
      <div class="ml-auto">
        <button class="btn-sm btn-primary" onclick="openUserModal()">+ Pridať používateľa</button>
      </div>
    </div>
    <div class="users-grid" id="users-grid">
      <div style="text-align:center;padding:40px;color:var(--muted)">Načítavanie...</div>
    </div>
  </div>
</main>

<!-- IDEA DETAIL MODAL -->
<div class="modal-overlay" id="idea-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('idea-modal')">×</button>
    <h2 id="modal-title">Nápad #</h2>
    <div class="detail-meta" id="modal-meta"></div>

    <div class="detail-section">
      <label>Transkript</label>
      <p id="modal-transcript"></p>
    </div>

    <div class="detail-section" id="modal-ai-section" style="display:none">
      <label>AI Analýza</label>
      <div class="ai-analysis" id="modal-ai"></div>
    </div>

    <div class="detail-actions" id="modal-actions" style="display:none">
      <div style="width:100%">
        <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:6px">Zmeniť status</label>
        <select id="modal-status-select">
          <option value="new">Nový</option>
          <option value="in_review">V prehliadke</option>
          <option value="accepted">Prijatý</option>
          <option value="rejected">Zamietnutý</option>
        </select>
      </div>
      <div style="width:100%">
        <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:6px">Viditeľnosť</label>
        <select id="modal-visibility-select">
          <option value="personal">🔒 Osobný</option>
          <option value="company">🌐 Firemný</option>
        </select>
      </div>
      <div style="width:100%">
        <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:6px">Tagy</label>
        <div class="tag-chips" id="modal-tag-chips"></div>
        <div style="margin-top:8px">
          <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px" id="modal-tag-presets"></div>
          <div class="tag-add-row">
            <input class="tag-add-input" id="modal-tag-input" placeholder="Vlastný tag..." onkeydown="if(event.key==='Enter'){event.preventDefault();addCustomTag();}">
            <button class="btn-sm btn-ghost" onclick="addCustomTag()">Pridať</button>
          </div>
        </div>
      </div>
      <div style="width:100%">
        <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:6px">Poznámka recenzenta</label>
        <textarea id="modal-note" placeholder="Voliteľná poznámka..."></textarea>
      </div>
      <div style="display:flex;gap:10px;width:100%;justify-content:space-between;align-items:center">
        <div style="display:flex;gap:10px">
          <button class="btn-sm btn-primary" onclick="saveIdea()">Uložiť</button>
          <button class="btn-sm btn-ghost" onclick="analyzeIdea()">🤖 AI Analýza</button>
        </div>
        <button class="btn-sm" id="btn-delete-idea" onclick="deleteIdea()" style="background:rgba(239,68,68,0.1);color:#ef4444;border:1px solid rgba(239,68,68,0.3);display:none">🗑 Vymazať</button>
      </div>
    </div>
  </div>
</div>

<!-- USER MODAL -->
<div class="modal-overlay" id="user-modal">
  <div class="modal" style="max-width:480px">
    <button class="modal-close" onclick="closeModal('user-modal')">×</button>
    <h2 id="u-modal-title">Nový používateľ</h2>
    <div class="form-row">
      <div class="form-group">
        <label>Meno</label>
        <input type="text" id="u-name" placeholder="Ján Novák">
      </div>
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" id="u-email" placeholder="jan@firma.sk">
      </div>
    </div>
    <div class="form-group" id="u-pass-group">
      <label id="u-pass-label">Heslo</label>
      <input type="password" id="u-pass" placeholder="Dočasné heslo">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Rola</label>
        <select id="u-role">
          <option value="submitter">Prispievateľ</option>
          <option value="reviewer">Recenzent</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <div class="form-group">
        <label>Oddelenie</label>
        <select id="u-dept">
          <option value="">— vyber —</option>
          <option value="development">Vývoj</option>
          <option value="marketing">Marketing</option>
          <option value="production">Produkcia</option>
          <option value="management">Manažment</option>
          <option value="other">Iné</option>
        </select>
      </div>
    </div>
    <button id="u-save-btn" class="btn-sm btn-primary" style="width:100%;padding:12px;margin-top:8px" onclick="saveUser()">Vytvoriť používateľa</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let currentUser = null;
let currentIdea = null;
let ideasPage = 0;
const PAGE_SIZE = 20;
let editingUserId = null;
let usersData = [];
let searchTimer = null;

// ─── Init ────────────────────────────────────────────────────────────────────
async function init() {
  const r = await fetch('/api/current-user');
  if (!r.ok) { window.location.href = '/login'; return; }
  currentUser = await r.json();
  document.getElementById('user-badge').textContent = `${currentUser.name} (${currentUser.role})`;
  document.getElementById('f-search').value = '';
  setTimeout(() => { document.getElementById('f-search').value = ''; }, 500);
  if (currentUser.role === 'admin') {
    document.getElementById('nav-users').style.display = '';
  }
  loadIdeas();
}

// ─── Pages ───────────────────────────────────────────────────────────────────
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  event.target.classList.add('active');
  if (name === 'stats') loadStats();
  if (name === 'users') loadUsers();
}

// ─── Ideas ───────────────────────────────────────────────────────────────────
function debounceSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { ideasPage = 0; loadIdeas(); }, 400);
}

async function loadIdeas() {
  const params = new URLSearchParams();
  const status = document.getElementById('f-status').value;
  const dept = document.getElementById('f-dept').value;
  const role = document.getElementById('f-role').value;
  const search = document.getElementById('f-search').value.trim();
  if (status) params.set('status', status);
  if (dept) params.set('department', dept);
  if (role) params.set('role', role);
  if (search) params.set('search', search);
  params.set('limit', PAGE_SIZE);
  params.set('offset', ideasPage * PAGE_SIZE);

  const r = await fetch('/api/ideas?' + params);
  const data = await r.json();
  renderIdeas(data.data);
  renderPagination(data.total);
}

function renderTags(tagsJson) {
  try {
    const tags = JSON.parse(tagsJson || '[]');
    if (!tags.length) return '<span style="color:var(--muted);font-size:12px">—</span>';
    return tags.map(t => `<span class="badge badge-tag">${esc(t)}</span>`).join(' ');
  } catch { return '—'; }
}

function renderIdeas(ideas) {
  const tbody = document.getElementById('ideas-tbody');
  if (!ideas.length) {
    tbody.innerHTML = '<tr><td colspan="10"><div class="empty"><div class="icon">💭</div><p>Žiadne nápady</p></div></td></tr>';
    return;
  }
  tbody.innerHTML = ideas.map(i => `
    <tr onclick="openIdea(${i.id})">
      <td style="color:var(--muted)">#${i.id}</td>
      <td style="font-weight:500">${esc(i.author_name)}</td>
      <td><span class="badge badge-dept">${deptLabel(i.department)}</span></td>
      <td style="color:var(--muted);font-size:13px">${roleLabel(i.role)}</td>
      <td class="truncate" style="color:var(--muted)">${esc(i.transcript) || '—'}</td>
      <td>${i.ai_score > 0 ? `<span class="badge badge-score">⭐ ${i.ai_score}/10</span>` : '<span style="color:var(--muted);font-size:13px">—</span>'}</td>
      <td>${renderTags(i.tags)}</td>
      <td><span class="badge badge-${i.status}">${statusLabel(i.status)}</span></td>
      <td>${i.visibility === 'company' ? '<span class="badge badge-dept">🌐 Firemný</span>' : '<span style="color:var(--muted);font-size:12px">🔒 Osobný</span>'}</td>
      <td style="color:var(--muted);font-size:12px">${formatDate(i.created_at)}</td>
    </tr>
  `).join('');
}

function renderPagination(total) {
  const pages = Math.ceil(total / PAGE_SIZE);
  const pg = document.getElementById('pagination');
  if (pages <= 1) { pg.innerHTML = ''; return; }
  pg.innerHTML = `
    <button onclick="gotoPage(${ideasPage-1})" ${ideasPage===0?'disabled':''}>‹</button>
    <span>${ideasPage+1} / ${pages} (${total} celkovo)</span>
    <button onclick="gotoPage(${ideasPage+1})" ${ideasPage>=pages-1?'disabled':''}>›</button>
  `;
}

function gotoPage(p) { ideasPage = p; loadIdeas(); }

// ─── Idea detail ─────────────────────────────────────────────────────────────
async function openIdea(id) {
  const r = await fetch(`/api/ideas/${id}`);
  currentIdea = await r.json();
  const i = currentIdea;

  document.getElementById('modal-title').textContent = `Nápad #${i.id}`;
  document.getElementById('modal-meta').innerHTML = `
    <span class="badge badge-${i.status}">${statusLabel(i.status)}</span>
    <span class="badge badge-dept">${deptLabel(i.department)}</span>
    <span class="badge badge-dept">${roleLabel(i.role)}</span>
    <span class="badge badge-dept">👤 ${esc(i.author_name)}</span>
    ${i.duration_seconds > 0 ? `<span class="badge badge-dept">⏱ ${i.duration_seconds}s</span>` : ''}
    <span class="badge badge-dept">${i.visibility === 'company' ? '🌐 Firemný' : '🔒 Osobný'}</span>
    ${(() => { try { const t = JSON.parse(i.tags||'[]'); return t.map(tag=>`<span class="badge badge-tag">${esc(tag)}</span>`).join(''); } catch{return '';} })()}
  `;
  document.getElementById('modal-transcript').textContent = i.transcript || '(prázdny transkript)';

  const aiSection = document.getElementById('modal-ai-section');
  if (i.ai_analysis) {
    try {
      const a = JSON.parse(i.ai_analysis);
      aiSection.style.display = '';
      document.getElementById('modal-ai').innerHTML = `
        <div class="ai-row"><span>Celkové hodnotenie</span><strong>⭐ ${a.score}/10</strong></div>
        <div class="ai-row"><span>Jasnosť</span><strong>${a.clarity}/10</strong></div>
        <div class="ai-row"><span>Realizovateľnosť</span><strong>${a.feasibility}/10</strong></div>
        ${a.summary ? `<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-size:13px;color:var(--muted)">${esc(a.summary)}</div>` : ''}
        ${a.strengths?.length ? `<div style="margin-top:10px"><strong style="font-size:12px;color:var(--green)">✓ Silné stránky</strong><ul class="ai-list" style="margin-top:6px">${a.strengths.map(s=>`<li>${esc(s)}</li>`).join('')}</ul></div>` : ''}
        ${a.next_steps?.length ? `<div style="margin-top:10px"><strong style="font-size:12px;color:var(--primary)">→ Ďalšie kroky</strong><ul class="ai-list" style="margin-top:6px">${a.next_steps.map(s=>`<li>${esc(s)}</li>`).join('')}</ul></div>` : ''}
      `;
    } catch(e) { aiSection.style.display = 'none'; }
  } else {
    aiSection.style.display = 'none';
  }

  const actions = document.getElementById('modal-actions');
  if (currentUser.role === 'reviewer' || currentUser.role === 'admin') {
    actions.style.display = '';
    document.getElementById('modal-status-select').value = i.status;
    document.getElementById('modal-visibility-select').value = i.visibility || 'personal';
    document.getElementById('modal-note').value = i.reviewer_note || '';
    initTagEditor(i.tags);
  } else {
    actions.style.display = 'none';
  }

  // Show delete button only for admins
  document.getElementById('btn-delete-idea').style.display =
    currentUser.role === 'admin' ? '' : 'none';

  document.getElementById('idea-modal').classList.add('open');
}

async function deleteIdea() {
  if (!currentIdea) return;
  if (!confirm(`Naozaj vymazať nápad #${currentIdea.id}? Táto akcia je nevratná.`)) return;
  const r = await fetch(`/api/ideas/${currentIdea.id}`, { method: 'DELETE' });
  if (r.ok) {
    closeModal('idea-modal');
    loadIdeas();
    showToast('Nápad vymazaný', 'success');
  } else {
    showToast('Chyba pri mazaní', 'error');
  }
}

const PRESET_TAGS = ['quick_win','cost_reduction','product','process','customer','technical','innovation','urgent','automation','hr','marketing','quality'];
let currentTags = [];

function initTagEditor(tagsJson) {
  try { currentTags = JSON.parse(tagsJson || '[]'); } catch { currentTags = []; }
  renderTagEditor();
}

function renderTagEditor() {
  const chips = document.getElementById('modal-tag-chips');
  chips.innerHTML = currentTags.map((t, i) =>
    `<span class="tag-chip">${esc(t)} <span class="tag-x" onclick="removeTag(${i})">×</span></span>`
  ).join('');
  const presets = document.getElementById('modal-tag-presets');
  presets.innerHTML = PRESET_TAGS.map(t =>
    `<button type="button" class="tag-chip${currentTags.includes(t) ? ' selected' : ''}" onclick="togglePresetTag('${t}')" style="font-size:11px">${t}</button>`
  ).join('');
}

function togglePresetTag(tag) {
  const idx = currentTags.indexOf(tag);
  if (idx >= 0) currentTags.splice(idx, 1);
  else if (currentTags.length < 10) currentTags.push(tag);
  renderTagEditor();
}

function removeTag(idx) {
  currentTags.splice(idx, 1);
  renderTagEditor();
}

function addCustomTag() {
  const input = document.getElementById('modal-tag-input');
  const val = input.value.trim().toLowerCase().replace(/\s+/g, '_');
  if (val && !currentTags.includes(val) && currentTags.length < 10) {
    currentTags.push(val);
    renderTagEditor();
  }
  input.value = '';
}

async function saveIdea() {
  if (!currentIdea) return;
  const status = document.getElementById('modal-status-select').value;
  const visibility = document.getElementById('modal-visibility-select').value;
  const note = document.getElementById('modal-note').value;
  const r = await fetch(`/api/ideas/${currentIdea.id}`, {
    method: 'PATCH',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({status, reviewer_note: note, visibility, tags: JSON.stringify(currentTags)})
  });
  if (r.ok) {
    showToast('Uložené', 'success');
    closeModal('idea-modal');
    loadIdeas();
  } else {
    showToast('Chyba pri ukladaní', 'error');
  }
}

async function analyzeIdea() {
  if (!currentIdea) return;
  showToast('Spúšťam AI analýzu...', '');
  const r = await fetch(`/api/ideas/${currentIdea.id}/analyze`, {method: 'POST'});
  if (r.ok) {
    showToast('AI analýza dokončená', 'success');
    closeModal('idea-modal');
    await openIdea(currentIdea.id);
    loadIdeas();
  } else {
    const d = await r.json();
    showToast(d.error || 'AI analýza zlyhala', 'error');
  }
}

// ─── Stats ───────────────────────────────────────────────────────────────────
async function loadStats() {
  const r = await fetch('/api/stats');
  const d = await r.json();
  document.getElementById('s-total').textContent = d.total;
  document.getElementById('s-accepted').textContent = d.by_status?.accepted || 0;
  document.getElementById('s-review').textContent = d.by_status?.in_review || 0;
  document.getElementById('s-new').textContent = d.by_status?.new || 0;
  document.getElementById('s-rejected').textContent = d.by_status?.rejected || 0;

  const deptEl = document.getElementById('dept-stats');
  if (d.by_department && Object.keys(d.by_department).length) {
    deptEl.innerHTML = Object.entries(d.by_department).map(([k,v]) =>
      `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:14px">
        <span>${deptLabel(k)}</span><strong>${v}</strong></div>`
    ).join('');
  } else {
    deptEl.innerHTML = '<p style="color:var(--muted);font-size:14px">Žiadne dáta</p>';
  }

  const recentEl = document.getElementById('recent-ideas');
  if (d.recent?.length) {
    recentEl.innerHTML = d.recent.map(i =>
      `<div style="padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;cursor:pointer" onclick="openIdea(${i.id})">
        <div style="font-weight:500">${esc(i.author_name)} <span style="color:var(--muted)">· ${deptLabel(i.department)}</span></div>
        <div style="color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:280px">${esc(i.transcript) || '—'}</div>
      </div>`
    ).join('');
  } else {
    recentEl.innerHTML = '<p style="color:var(--muted);font-size:14px">Žiadne nápady</p>';
  }
}

// ─── Users ───────────────────────────────────────────────────────────────────
async function loadUsers() {
  const r = await fetch('/api/users');
  if (!r.ok) return;
  const users = await r.json();
  usersData = users;
  const grid = document.getElementById('users-grid');
  if (!users.length) {
    grid.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted)">Žiadni používatelia</div>';
    return;
  }
  grid.innerHTML = users.map(u => `
    <div class="user-card">
      <div class="user-avatar">${u.display_name[0].toUpperCase()}</div>
      <div class="user-info">
        <div class="user-name">${esc(u.display_name)} ${u.active ? '' : '<span style="color:var(--red);font-size:12px">(neaktívny)</span>'}</div>
        <div class="user-email">${esc(u.email)} · <span class="badge badge-dept" style="font-size:11px">${u.role}</span> ${u.department ? `· ${deptLabel(u.department)}` : ''}</div>
      </div>
      <div class="user-actions">
        <button class="btn-sm btn-ghost" onclick="openEditUserModal(${u.id})">Upraviť</button>
        <button class="btn-sm btn-ghost" onclick="toggleUser(${u.id}, ${u.active})">${u.active ? 'Deaktivovať' : 'Aktivovať'}</button>
      </div>
    </div>
  `).join('');
}

function openUserModal() {
  editingUserId = null;
  ['u-name','u-email','u-pass'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('u-email').removeAttribute('readonly');
  document.getElementById('u-modal-title').textContent = 'Nový používateľ';
  document.getElementById('u-pass-label').textContent = 'Heslo';
  document.getElementById('u-pass').placeholder = 'Dočasné heslo';
  document.getElementById('u-save-btn').textContent = 'Vytvoriť používateľa';
  document.getElementById('user-modal').classList.add('open');
}

function openEditUserModal(id) {
  const u = usersData.find(x => x.id === id);
  if (!u) return;
  editingUserId = id;
  document.getElementById('u-name').value = u.display_name;
  document.getElementById('u-email').value = u.email;
  document.getElementById('u-email').setAttribute('readonly', true);
  document.getElementById('u-pass').value = '';
  document.getElementById('u-role').value = u.role;
  document.getElementById('u-dept').value = u.department || '';
  document.getElementById('u-modal-title').textContent = 'Upraviť používateľa';
  document.getElementById('u-pass-label').textContent = 'Nové heslo (nepovinné)';
  document.getElementById('u-pass').placeholder = 'Nechajte prázdne — heslo sa nezmení';
  document.getElementById('u-save-btn').textContent = 'Uložiť zmeny';
  document.getElementById('user-modal').classList.add('open');
}

async function saveUser() {
  const name = document.getElementById('u-name').value.trim();
  const email = document.getElementById('u-email').value.trim();
  const pass = document.getElementById('u-pass').value;
  const role = document.getElementById('u-role').value;
  const dept = document.getElementById('u-dept').value;

  if (editingUserId) {
    // Edit mode — email not changeable, password optional
    if (!name) { showToast('Zadajte meno', 'error'); return; }
    const body = {display_name: name, role, department: dept};
    if (pass) body.password = pass;
    const r = await fetch(`/api/users/${editingUserId}`, {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    });
    if (r.ok) {
      showToast('Používateľ uložený', 'success');
      closeModal('user-modal');
      loadUsers();
    } else {
      const d = await r.json();
      showToast(d.error || 'Chyba', 'error');
    }
  } else {
    // Create mode — all fields required
    if (!name || !email || !pass) { showToast('Vyplňte všetky polia', 'error'); return; }
    const r = await fetch('/api/users', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({display_name: name, email, password: pass, role, department: dept})
    });
    if (r.ok) {
      showToast('Používateľ vytvorený', 'success');
      closeModal('user-modal');
      loadUsers();
    } else {
      const d = await r.json();
      showToast(d.error || 'Chyba', 'error');
    }
  }
}

async function toggleUser(id, active) {
  await fetch(`/api/users/${id}`, {
    method: 'PATCH',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({active: active ? 0 : 1})
  });
  loadUsers();
}

// ─── Auth ────────────────────────────────────────────────────────────────────
async function doLogout() {
  await fetch('/api/logout', {method: 'POST'});
  window.location.href = '/login';
}

// ─── Helpers ─────────────────────────────────────────────────────────────────
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
});

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3000);
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function statusLabel(s) {
  return {new:'Nový',in_review:'V prehliadke',accepted:'Prijatý',rejected:'Zamietnutý'}[s] || s;
}

function deptLabel(d) {
  return {development:'Vývoj',marketing:'Marketing',production:'Produkcia',management:'Manažment',other:'Iné'}[d] || d || '—';
}

function roleLabel(r) {
  return {'c-level':'C-level',manager:'Manažér',employee:'Zamestnanec','majo-markech':'Majo markech je kral'}[r] || r || '—';
}

function formatDate(s) {
  if (!s) return '—';
  try {
    const d = new Date(s);
    return d.toLocaleDateString('sk-SK', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
  } catch { return s; }
}

init();
</script>
