<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src https://ridea.onrender.com http://localhost:5001; media-src *">
<title>Ridea</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #512D6D; font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; }

#login-screen, #rec-screen {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  display: none;
}

#login-screen {
  align-items: center;
  justify-content: center;
}
.card {
  background: #ffffff;
  border-radius: 14px;
  padding: 30px 26px;
  width: 300px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.card-title { font-size: 20px; font-weight: 700; color: #512D6D; text-align: center; margin-bottom: 4px; }
.card-sub   { font-size: 13px; color: #6b7280; text-align: center; margin-bottom: 20px; }
.f {
  display: block; width: 100%; padding: 10px 13px; margin-bottom: 10px;
  border: 1.5px solid #d1d5db; border-radius: 8px;
  font-size: 14px; color: #111827; background: #f9fafb; outline: none;
}
.f:focus { border-color: #512D6D; background: #fff; }
.chk { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #6b7280; margin-bottom: 16px; }
.chk input { width: 14px; height: 14px; accent-color: #512D6D; }
.btn-in {
  display: block; width: 100%; padding: 11px;
  background: #512D6D; color: #fff; border: none;
  border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer;
}
.btn-in:hover { background: #3d1f54; }
.lerr { font-size: 12px; color: #ef4444; text-align: center; margin-top: 8px; min-height: 18px; }

#rec-screen {
  flex-direction: column;
  padding: 14px 16px;
  gap: 8px;
  color: #f0e6f6;
  overflow-y: auto;
}
.topbar { display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
.uname { font-weight: 600; font-size: 15px; }
.btn-out { background: none; border: none; color: rgba(255,255,255,0.4); font-size: 12px; cursor: pointer; padding: 4px 8px; border-radius: 6px; }
.btn-out:hover { color: #ef4444; }

.sels { display: flex; gap: 8px; flex-shrink: 0; }
.sel {
  flex: 1; padding: 9px 10px;
  background: #3d1f54; border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px; color: #f0e6f6; font-size: 13px;
  outline: none; cursor: pointer; text-align: center;
}
.sel option { background: #3d1f54; color: #f0e6f6; padding: 6px; }
.sel:focus { border-color: rgba(255,255,255,0.4); }

.mid { flex: 1; min-height: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; }
.rbtn {
  width: 72px; height: 72px; border-radius: 50%;
  border: 3px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.08);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: transform .15s;
}
.rbtn:hover { transform: scale(1.05); }
.rbtn.on { border-color: #ef4444; animation: g 1.5s infinite; }
@keyframes g { 0%{box-shadow:0 0 0 0 rgba(239,68,68,.4)} 70%{box-shadow:0 0 0 14px rgba(239,68,68,0)} 100%{box-shadow:0 0 0 0 rgba(239,68,68,0)} }
.rdot { width: 28px; height: 28px; border-radius: 50%; background: rgba(255,255,255,0.5); transition: all .15s; }
.rbtn.on .rdot { background: #ef4444; border-radius: 7px; width: 22px; height: 22px; }
.rtime { font-size: 26px; font-weight: 700; letter-spacing: 3px; }
.rhint { font-size: 11px; color: rgba(255,255,255,0.4); }

#visualizer { width: 100%; max-width: 240px; height: 40px; border-radius: 8px; display: none; }
#visualizer.active { display: block; }

.audio-info { font-size: 10px; color: rgba(255,255,255,0.35); text-align: center; padding: 2px 0; }
.audio-info .active-src { color: #4ade80; }

.tab-row { display: flex; gap: 0; flex-shrink: 0; border-radius: 8px; overflow: hidden; border: 1px solid rgba(255,255,255,0.12); }
.tab-btn { flex: 1; padding: 8px 6px; background: rgba(255,255,255,0.04); border: none; color: rgba(255,255,255,0.4); font-size: 12px; font-weight: 600; cursor: pointer; transition: all .15s; }
.tab-btn.active { background: rgba(255,255,255,0.15); color: #f0e6f6; }

#text-panel { display: none; flex-direction: column; gap: 8px; flex: 1; min-height: 0; }
#text-panel.active { display: flex; }
#voice-panel { display: none; flex-direction: column; align-items: center; justify-content: center; gap: 8px; flex: 1; min-height: 0; }
#voice-panel.active { display: flex; }
.txt-area {
  flex: 1; min-height: 80px; padding: 10px; border-radius: 8px;
  background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.15);
  color: #f0e6f6; font-size: 13px; font-family: inherit; resize: none; outline: none;
}
.txt-area::placeholder { color: rgba(255,255,255,0.3); }
.txt-area:focus { border-color: rgba(255,255,255,0.4); }
.txt-send {
  padding: 10px; background: #fff; color: #512D6D; border: none;
  border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer;
}
.txt-send:hover { background: #f0e6f6; }
.txt-send:disabled { opacity: .5; cursor: not-allowed; }

.vis-row { display: flex; gap: 6px; flex-shrink: 0; }
.vis-btn { flex: 1; padding: 7px 6px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; color: rgba(255,255,255,0.4); font-size: 12px; cursor: pointer; transition: all .15s; }
.vis-btn.active { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.3); color: #f0e6f6; }

.acts { display: flex; gap: 10px; flex-shrink: 0; }
.bsend { flex: 1; padding: 10px; background: #fff; color: #512D6D; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; }
.bsend:hover { background: #f0e6f6; }
.bsend:disabled { opacity: .5; cursor: not-allowed; }
.bx { padding: 10px 15px; background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.5); border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; font-size: 14px; cursor: pointer; }
.bx:hover { color: #ef4444; border-color: #ef4444; }

.bar { height: 3px; background: rgba(255,255,255,0.12); border-radius: 3px; flex-shrink: 0; }
.bfill { height: 100%; background: #d4a6f5; width: 0%; transition: width .3s; border-radius: 3px; }
.smsg { font-size: 12px; text-align: center; color: rgba(255,255,255,0.4); min-height: 16px; flex-shrink: 0; }
.smsg.ok { color: #4ade80; } .smsg.err { color: #f87171; } .smsg.inf { color: #d4a6f5; }
.adml { font-size: 11px; color: rgba(255,255,255,0.3); text-align: center; cursor: pointer; flex-shrink: 0; }
.adml:hover { color: #d4a6f5; }

/* Recent ideas */
.recent-section { flex-shrink: 0; margin-top: 4px; }
.recent-toggle { font-size: 12px; color: rgba(255,255,255,0.5); text-align: center; cursor: pointer; padding: 6px 0; transition: color .2s; }
.recent-toggle:hover { color: #d4a6f5; }
.recent-list { display: none; max-height: 180px; overflow-y: auto; padding: 0 4px; }
.recent-list.show { display: block; }
.recent-item { background: rgba(255,255,255,0.06); border-radius: 8px; padding: 8px 10px; margin-bottom: 6px; cursor: pointer; transition: background .2s; }
.recent-item:hover { background: rgba(255,255,255,0.12); }
.recent-item .ri-top { display: flex; justify-content: space-between; align-items: center; font-size: 10px; color: rgba(255,255,255,0.4); margin-bottom: 3px; }
.recent-item .ri-id { font-weight: 600; color: #d4a6f5; }
.recent-item .ri-text { font-size: 12px; color: rgba(255,255,255,0.8); line-height: 1.4; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
.recent-item .ri-meta { display: flex; gap: 8px; margin-top: 3px; font-size: 9px; color: rgba(255,255,255,0.3); }
.recent-item .ri-badge { display: inline-block; padding: 1px 5px; border-radius: 4px; font-size: 9px; }
.ri-badge.el { background: rgba(106,212,134,0.15); color: #6ad486; }
.ri-badge.wh { background: rgba(251,191,36,0.15); color: #fbbf24; }

#file-panel { display: none; flex-direction: column; gap: 8px; flex: 1; min-height: 0; justify-content: center; }
#file-panel.active { display: flex; }
.file-upload-area {
  border: 2px dashed rgba(255,255,255,0.2); border-radius: 12px;
  padding: 24px 14px; text-align: center; cursor: pointer;
  transition: border-color .2s, background .2s;
}
.file-upload-area:hover, .file-upload-area.dragover {
  border-color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.05);
}
.file-icon { font-size: 32px; margin-bottom: 6px; }
.file-hint { font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 4px; }
.file-formats { font-size: 10px; color: rgba(255,255,255,0.3); }
.file-selected { background: rgba(255,255,255,0.08); border-radius: 10px; padding: 10px; }
.file-name { font-size: 13px; color: #f0e6f6; font-weight: 600; word-break: break-all; }
.file-size { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; }
#file-preview { border-radius: 8px; margin-top: 6px; }

/* Vault banner - unsent recordings */
.vault-banner { display: none; flex-shrink: 0; background: rgba(248,113,113,0.12); border: 1px solid rgba(248,113,113,0.3); border-radius: 8px; padding: 8px 10px; cursor: pointer; transition: all .2s; }
.vault-banner.show { display: flex; align-items: center; gap: 8px; }
.vault-banner:hover { background: rgba(248,113,113,0.18); }
.vault-icon { font-size: 18px; }
.vault-text { flex: 1; font-size: 12px; color: #f87171; font-weight: 600; }
.vault-count { font-size: 11px; color: rgba(255,255,255,0.4); }
.vault-list { display: none; flex-direction: column; gap: 6px; flex-shrink: 0; max-height: 220px; overflow-y: auto; }
.vault-list.open { display: flex; }
.vault-item { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 8px 10px; }
.vault-item .vi-top { display: flex; justify-content: space-between; align-items: center; }
.vault-item .vi-info { font-size: 11px; color: rgba(255,255,255,0.5); }
.vault-item .vi-status { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 600; }
.vault-item .vi-status.pending { background: rgba(250,204,21,0.15); color: #facc15; }
.vault-item .vi-status.uploading { background: rgba(96,165,250,0.15); color: #60a5fa; }
.vault-item .vi-status.error { background: rgba(248,113,113,0.15); color: #f87171; }
.vault-item .vi-actions { display: flex; gap: 6px; margin-top: 6px; }
.vault-item .vi-btn { padding: 5px 10px; border: none; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; }
.vi-btn.retry { background: rgba(74,222,128,0.15); color: #4ade80; }
.vi-btn.retry:hover { background: rgba(74,222,128,0.25); }
.vi-btn.download { background: rgba(96,165,250,0.15); color: #60a5fa; }
.vi-btn.download:hover { background: rgba(96,165,250,0.25); }
.vi-btn.delete { background: rgba(248,113,113,0.1); color: rgba(248,113,113,0.6); }
.vi-btn.delete:hover { background: rgba(248,113,113,0.2); color: #f87171; }
</style>
</head>
<body>

<div id="login-screen">
  <div class="card">
    <div class="card-title">RI Ridea</div>
    <div class="card-sub">Zachytavac napadov</div>
    <input class="f" type="email"    id="le" placeholder="E-mail"  autocomplete="username">
    <input class="f" type="password" id="lp" placeholder="Heslo"   autocomplete="current-password">
    <div class="chk"><input type="checkbox" id="lr" checked><label for="lr">Zapamata prihlasenie</label></div>
    <button class="btn-in" onclick="doLogin()">Prihlasit sa</button>
    <div class="lerr" id="lerr"></div>
  </div>
</div>

<div id="rec-screen">
  <div class="topbar">
    <span class="uname" id="uname">&#8212;</span>
    <button class="btn-out" onclick="doLogout()">Odhlasit</button>
  </div>
  <div class="sels">
    <select class="sel" id="dept" onchange="savePref('savedDept', this.value)">
      <option value="">Oddelenie</option>
      <option value="development">Vyvoj</option>
      <option value="marketing">Marketing</option>
      <option value="production">Produkcia</option>
      <option value="management">Manazment</option>
      <option value="other">Ine</option>
    </select>
    <select class="sel" id="role" onchange="savePref('savedRole', this.value)">
      <option value="">Rola</option>
      <option value="c-level">C-level</option>
      <option value="manager">Manazer</option>
      <option value="employee">Zamestnanec</option>
    </select>
  </div>
  <div class="vis-row">
    <button type="button" class="vis-btn" id="vis-personal" onclick="setVisibility('personal')">Moj napad</button>
    <button type="button" class="vis-btn active" id="vis-company" onclick="setVisibility('company')">Pre celu firmu</button>
  </div>

  <div class="tab-row">
    <button type="button" class="tab-btn active" id="tab-voice" onclick="switchTab('voice')">&#127908; Hlasovy</button>
    <button type="button" class="tab-btn" id="tab-text" onclick="switchTab('text')">&#9997; Textovy</button>
    <button type="button" class="tab-btn" id="tab-file" onclick="switchTab('file')">&#128206; Subor</button>
  </div>

  <div class="vault-banner" id="vault-banner" onclick="toggleVaultList()">
    <span class="vault-icon">&#128190;</span>
    <span class="vault-text">Neodoslane nahravky</span>
    <span class="vault-count" id="vault-count"></span>
  </div>
  <div class="vault-list" id="vault-list"></div>

  <div id="voice-panel" class="active">
    <canvas id="visualizer"></canvas>
    <button class="rbtn" id="rbtn" onclick="toggleRec()"><div class="rdot"></div></button>
    <div class="rtime" id="rtime">&#8212;</div>
    <div class="rhint" id="rhint">Klikni pre nahravanie</div>
    <div class="audio-info" id="audio-info"></div>
  </div>

  <div id="text-panel">
    <textarea class="txt-area" id="txtIdea" placeholder="Napiste svoj napad..."></textarea>
    <button class="txt-send" id="txtSend" onclick="sendTextIdea()">Odoslat textovy napad</button>
  </div>

  <div id="file-panel">
    <div class="file-upload-area" id="file-drop-area">
      <div class="file-icon">&#127925;</div>
      <div class="file-hint">Kliknite alebo presunte audio subor</div>
      <div class="file-formats">MP3, WAV, OGG, M4A, WebM, FLAC, OPUS</div>
      <input type="file" id="fileInput" accept="audio/*,.mp3,.wav,.ogg,.m4a,.webm,.flac,.opus,.mp4,.mpeg" style="display:none" onchange="handleFileSelect(this)">
    </div>
    <div class="file-selected" id="file-selected" style="display:none">
      <div class="file-name" id="file-name"></div>
      <div class="file-size" id="file-size"></div>
      <audio id="file-preview" controls style="width:100%;"></audio>
    </div>
    <button class="txt-send" id="fileSend" onclick="sendFileIdea()" style="display:none">Odoslat audio napad</button>
  </div>

  <div class="acts" id="acts" style="display:none">
    <button class="bx" onclick="discard()">&#10005;</button>
    <button class="bsend" id="bsend" onclick="sendIdea()">Odoslat napad</button>
  </div>
  <div class="bar"><div class="bfill" id="bfill"></div></div>
  <div class="smsg" id="smsg"></div>

  <div class="recent-section">
    <div class="recent-toggle" id="recent-toggle" onclick="toggleRecent()">&#9662; Posledné nápady</div>
    <div class="recent-list" id="recent-list"></div>
  </div>

  <div class="adml" onclick="openAdmin()">Admin konzola</div>
</div>

<script>
// ══════════════════════════════════════════════════════════════
// AudioVault — IndexedDB backup for recordings (Electron)
// ══════════════════════════════════════════════════════════════
var _vaultDB = null;
var _vaultOpen = false;

function openVaultDB() {
  return new Promise(function(resolve, reject) {
    if (_vaultDB) { resolve(_vaultDB); return; }
    var req = indexedDB.open('RideaAudioVault', 1);
    req.onupgradeneeded = function(e) {
      var db = e.target.result;
      if (!db.objectStoreNames.contains('recordings')) {
        var store = db.createObjectStore('recordings', { keyPath: 'id', autoIncrement: true });
        store.createIndex('status', 'status', { unique: false });
      }
    };
    req.onsuccess = function(e) { _vaultDB = e.target.result; resolve(_vaultDB); };
    req.onerror = function() { reject(new Error('IndexedDB unavailable')); };
  });
}

function vaultSave(blobData, filename, dept, role, visibility) {
  return openVaultDB().then(function(db) {
    return new Promise(function(resolve, reject) {
      var tx = db.transaction('recordings', 'readwrite');
      var store = tx.objectStore('recordings');
      var record = {
        blob: blobData,
        filename: filename,
        dept: dept,
        role: role,
        visibility: visibility,
        created: new Date().toISOString(),
        size: blobData.size,
        status: 'pending',
        jobId: null,
        errorMsg: null,
        retries: 0
      };
      var req = store.add(record);
      req.onsuccess = function() { resolve(req.result); };
      req.onerror = function() { reject(new Error('Vault save failed')); };
    });
  });
}

function vaultUpdate(id, fields) {
  return openVaultDB().then(function(db) {
    return new Promise(function(resolve, reject) {
      var tx = db.transaction('recordings', 'readwrite');
      var store = tx.objectStore('recordings');
      var getReq = store.get(id);
      getReq.onsuccess = function() {
        var rec = getReq.result;
        if (!rec) { resolve(); return; }
        Object.keys(fields).forEach(function(k) { rec[k] = fields[k]; });
        store.put(rec);
        resolve();
      };
      getReq.onerror = function() { reject(new Error('Vault update failed')); };
    });
  });
}

function vaultDelete(id) {
  return openVaultDB().then(function(db) {
    return new Promise(function(resolve, reject) {
      var tx = db.transaction('recordings', 'readwrite');
      tx.objectStore('recordings').delete(id);
      tx.oncomplete = function() { resolve(); };
      tx.onerror = function() { reject(); };
    });
  });
}

function vaultGetAll() {
  return openVaultDB().then(function(db) {
    return new Promise(function(resolve) {
      var tx = db.transaction('recordings', 'readonly');
      var req = tx.objectStore('recordings').getAll();
      req.onsuccess = function() { resolve(req.result || []); };
      req.onerror = function() { resolve([]); };
    });
  });
}

function vaultGet(id) {
  return openVaultDB().then(function(db) {
    return new Promise(function(resolve) {
      var tx = db.transaction('recordings', 'readonly');
      var req = tx.objectStore('recordings').get(id);
      req.onsuccess = function() { resolve(req.result || null); };
      req.onerror = function() { resolve(null); };
    });
  });
}

function toggleVaultList() {
  _vaultOpen = !_vaultOpen;
  document.getElementById('vault-list').classList.toggle('open', _vaultOpen);
}

function refreshVaultUI() {
  vaultGetAll().then(function(items) {
    var pending = items.filter(function(i) { return i.status !== 'done'; });
    var banner = document.getElementById('vault-banner');
    var list = document.getElementById('vault-list');
    if (pending.length === 0) {
      banner.classList.remove('show');
      list.classList.remove('open'); list.innerHTML = ''; _vaultOpen = false;
      return;
    }
    banner.classList.add('show');
    document.getElementById('vault-count').textContent = pending.length + ' zaznam' + (pending.length > 1 ? 'ov' : '');
    var html = '';
    pending.forEach(function(item) {
      var d = new Date(item.created);
      var time = d.getDate() + '.' + (d.getMonth()+1) + '. ' + d.getHours() + ':' + (d.getMinutes()<10?'0':'') + d.getMinutes();
      var sizeMB = (item.size / 1024 / 1024).toFixed(1);
      var statusLabel = item.status === 'pending' ? 'Caka' : item.status === 'uploading' ? 'Odosielam...' : 'Chyba';
      var statusCls = item.status === 'pending' ? 'pending' : item.status === 'uploading' ? 'uploading' : 'error';
      html += '<div class="vault-item">';
      html += '<div class="vi-top"><span class="vi-info">' + time + ' &middot; ' + sizeMB + ' MB</span>';
      html += '<span class="vi-status ' + statusCls + '">' + statusLabel + '</span></div>';
      if (item.errorMsg) html += '<div style="font-size:10px;color:#f87171;margin-top:3px">' + item.errorMsg + '</div>';
      html += '<div class="vi-actions">';
      if (item.status !== 'uploading') {
        html += '<button class="vi-btn retry" onclick="vaultRetry(' + item.id + ')">&#8635; Odoslat znova</button>';
      }
      html += '<button class="vi-btn download" onclick="vaultDownload(' + item.id + ')">&#11015; Stiahnut</button>';
      html += '<button class="vi-btn delete" onclick="vaultRemove(' + item.id + ')">&#10005;</button>';
      html += '</div></div>';
    });
    list.innerHTML = html;
  });
}

function vaultDownload(id) {
  vaultGet(id).then(function(rec) {
    if (!rec) return;
    var url = URL.createObjectURL(rec.blob);
    var a = document.createElement('a');
    a.href = url; a.download = rec.filename || ('nahravka_' + id + '.webm');
    a.click();
    setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
  });
}

function vaultRemove(id) {
  if (!confirm('Naozaj vymazat nahravku? Tato akcia je nevratna.')) return;
  vaultDelete(id).then(refreshVaultUI);
}

function vaultRetry(id) {
  vaultGet(id).then(function(rec) {
    if (!rec || !rec.blob) { setMsg('Nahravka nenajdena', 'err'); return; }
    vaultUpdate(id, { status: 'uploading', errorMsg: null, retries: rec.retries + 1 }).then(function() {
      refreshVaultUI();
      _doVaultUpload(id, rec.blob, rec.filename, rec.dept, rec.role, rec.visibility);
    });
  });
}

function _doVaultUpload(vaultId, blobData, filename, dept, role, visibility) {
  var fill = document.getElementById('bfill');
  fill.style.width = '15%';
  var sizeMB = (blobData.size / 1024 / 1024).toFixed(1);
  setMsg('Odosielam zalohovanu nahravku (' + sizeMB + ' MB)...', 'inf');
  var fd = new FormData();
  fd.append('audio', blobData, filename);
  fd.append('department', dept);
  fd.append('role', role);
  fd.append('visibility', visibility);
  var ctrl = new AbortController();
  var tout = setTimeout(function() { ctrl.abort(); }, 120000);
  fetch(API + '/api/ideas/upload', { method: 'POST', body: fd, credentials: 'include', signal: ctrl.signal })
    .then(function(r) { clearTimeout(tout); return r; }, function(e) { clearTimeout(tout); throw e; })
    .then(function(r) {
      if (!r.ok) return r.json().then(function(d) { throw new Error(d.error || 'Chyba ' + r.status); });
      return r.json();
    })
    .then(function(data) {
      if (data.job_id) {
        setMsg('Prepisujem...', 'inf'); fill.style.width = '40%';
        vaultUpdate(vaultId, { jobId: data.job_id });
        _pollVaultJob(vaultId, data.job_id, fill);
      } else {
        fill.style.width = '100%'; setMsg('Napad odoslany!', 'ok');
        vaultUpdate(vaultId, { status: 'done' }).then(function() {
          setTimeout(function() { vaultDelete(vaultId).then(refreshVaultUI); fill.style.width = '0%'; clearMsg(); }, 3000);
        });
      }
    })
    .catch(function(err) {
      fill.style.width = '0%';
      setMsg('Chyba: ' + err.message + ' - nahravka ulozena lokalne', 'err');
      vaultUpdate(vaultId, { status: 'error', errorMsg: err.message }).then(refreshVaultUI);
    });
}

function _pollVaultJob(vaultId, jobId, fill) {
  var attempts = 0;
  function poll() {
    if (attempts >= 200) {
      setMsg('Timeout - nahravka ulozena lokalne', 'err'); fill.style.width = '0%';
      vaultUpdate(vaultId, { status: 'error', errorMsg: 'Timeout' }).then(refreshVaultUI);
      return;
    }
    attempts++;
    fetch(API + '/api/ideas/job/' + jobId, { credentials: 'include' })
      .then(function(r) {
        if (r.status === 202) {
          fill.style.width = Math.min(40 + attempts, 95) + '%';
          if (attempts % 10 === 0) setMsg('Prepisujem... este chvilu', 'inf');
          setTimeout(poll, 3000); return;
        }
        if (r.ok) {
            fill.style.width = '100%'; setMsg('Napad odoslany!', 'ok');
            vaultUpdate(vaultId, { status: 'done' }).then(function() {
              setTimeout(function() { vaultDelete(vaultId).then(refreshVaultUI); fill.style.width = '0%'; clearMsg(); }, 3000);
            });
        } else if (r.status === 404) {
          // Job completed fast and was cleaned up - check if idea was saved
          fetch(API + '/api/ideas/my-recent', { credentials: 'include' })
            .then(function(mr) { return mr.ok ? mr.json() : []; })
            .then(function(recent) {
              var now = Date.now();
              var found = (recent || []).some(function(idea) {
                var created = new Date(idea.created_at).getTime();
                return (now - created) < 120000;
              });
              if (found) {
                fill.style.width = '100%'; setMsg('Napad odoslany!', 'ok');
                vaultUpdate(vaultId, { status: 'done' }).then(function() {
                  setTimeout(function() { vaultDelete(vaultId).then(refreshVaultUI); fill.style.width = '0%'; clearMsg(); }, 3000);
                });
              } else {
                setMsg('Spracovanie prebieha...', 'inf');
                setTimeout(poll, 3000);
              }
            })
            .catch(function() { setTimeout(poll, 3000); });
        } else {
          r.json().catch(function() { return {}; }).then(function(d) {
            setMsg(d.error || 'Chyba pri spracovani', 'err'); fill.style.width = '0%';
            vaultUpdate(vaultId, { status: 'error', errorMsg: d.error || 'Server error' }).then(refreshVaultUI);
          });
        }
      })
      .catch(function() { setTimeout(poll, 3000); });
  }
  setTimeout(poll, 3000);
}

// ── Wake Lock: keeps screen on during recording (prevents Android/mobile sleep) ──
async function requestWakeLock() {
  if (!('wakeLock' in navigator)) return;
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    wakeLock.addEventListener('release', function() {
      if (mr && mr.state === 'recording') requestWakeLock();
    });
  } catch(e) {}
}
function releaseWakeLock() {
  if (wakeLock) { wakeLock.release().catch(function(){}); wakeLock = null; }
}
document.addEventListener('visibilitychange', function() {
  if (document.visibilityState === 'visible' && mr && mr.state === 'recording') {
    requestWakeLock();
    if (recordStartTime) {
      secs = Math.floor((Date.now() - recordStartTime) / 1000);
      var m = Math.floor(secs/60), s = secs%60;
      document.getElementById('rtime').textContent = m+':'+(s<10?'0':'')+s;
    }
  }
  // Detect if recording was killed while screen was off
  if (document.visibilityState === 'visible' && mr && mr.state === 'inactive' && recordStartTime) {
    recordStartTime = null;
    releaseWakeLock();
    stopSilentAudio();
    clearInterval(ti);
    document.getElementById('rbtn').classList.remove('on');
    if (chunks.length > 0) {
      blob = new Blob(chunks, { type: 'audio/webm' });
      document.getElementById('acts').style.display = 'flex';
      document.getElementById('rhint').textContent = 'Nahravka prerusena (obrazovka zamknuta)';
      setMsg('Nahravanie prerusene. Zalohujem...', 'inf');
      // Auto-save interrupted recording to vault
      var dept = document.getElementById('dept').value;
      var role = document.getElementById('role').value;
      if (dept && role) {
        vaultSave(blob, 'prerusena_' + Date.now() + '.webm', dept, role, currentVisibility)
          .then(function() { setMsg('Prerusena nahravka zalohovana! Mozete odoslat alebo stiahnut.', 'err'); refreshVaultUI(); })
          .catch(function() { setMsg('Nahravanie prerusene. Odoslte co najskor.', 'err'); });
      } else {
        setMsg('Nahravanie prerusene. Mozete odoslat co sa nahrato.', 'err');
      }
    } else {
      document.getElementById('rhint').textContent = 'Nahravanie prerusene';
      setMsg('Android zastavil nahravanie pri zamknuti obrazovky.', 'err');
    }
  }
});

function stopVisualizer() {
  if (animId) { cancelAnimationFrame(animId); animId = null; }
  if (audioCtx) { audioCtx.close().catch(function(){}); audioCtx = null; }
  var canvas = document.getElementById('visualizer');

  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function stopAllStreams() {
  activeStreams.forEach(function(s) {
    s.getTracks().forEach(function(t) { t.stop(); });
  });
  activeStreams = [];
}

// -- Recording --
async function toggleRec() {
  if (mr && mr.state==='recording') stopRec(); else await startRec();
}

async function startRec() {
  var dept = document.getElementById('dept').value;
  var role = document.getElementById('role').value;
  if (!dept||!role) { setMsg('Vyber oddelenie a rolu','err'); return; }

  var micStream = null;
  var systemStream = null;
  var sources = [];
  activeStreams = [];

  // Always get microphone
  try {
    micStream = await navigator.mediaDevices.getUserMedia({audio:true});
    activeStreams.push(micStream);
    sources.push('mikrofon');
  } catch(e) {
    setMsg(e.name==='NotAllowedError'?'Mikrofon odmietnuty':'Chyba: '+e.message,'err');
    return;
  }

  // Try to also get system audio
  if (navigator.mediaDevices.getDisplayMedia) {
    try {
      var displayStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
      var sysAudioTracks = displayStream.getAudioTracks();
      displayStream.getVideoTracks().forEach(function(t) { t.stop(); });
      if (sysAudioTracks.length > 0) {
        systemStream = new MediaStream(sysAudioTracks);
        activeStreams.push(systemStream);
        sources.push('systemovy zvuk');
      }
    } catch(e) {
      // User cancelled or not supported - continue with mic only
    }
  }

  // Mix streams using AudioContext
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    mixedDest = audioCtx.createMediaStreamDestination();

    var micSource = audioCtx.createMediaStreamSource(micStream);
    micSource.connect(mixedDest);

    if (systemStream) {
      var sysSource = audioCtx.createMediaStreamSource(systemStream);
      sysSource.connect(mixedDest);
    }

    // Analyser for visualizer
    analyserNode = audioCtx.createAnalyser();
    analyserNode.fftSize = 128;
    micSource.connect(analyserNode);
    if (systemStream) {
      var sysSource2 = audioCtx.createMediaStreamSource(systemStream);
      sysSource2.connect(analyserNode);
    }

    var mixedStream = mixedDest.stream;

    // Show active sources
    var infoEl = document.getElementById('audio-info');
    infoEl.innerHTML = '<span class="active-src">' + sources.join(' + ') + '</span>';

    // Start visualizer
    var canvas = document.getElementById('visualizer');
    canvas.classList.add('active');
    var ctx = canvas.getContext('2d');
    canvas.width = canvas.offsetWidth * 2;
    canvas.height = canvas.offsetHeight * 2;
    var bufLen = analyserNode.frequencyBinCount;
    var data = new Uint8Array(bufLen);
    var barW = canvas.width / bufLen;

    function draw() {
      animId = requestAnimationFrame(draw);
      analyserNode.getByteFrequencyData(data);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (var i = 0; i < bufLen; i++) {
        var v = data[i] / 255;
        var h = v * canvas.height;
        var x = i * barW;
        var r = 180 + Math.round(v * 59);
        var g = 75 - Math.round(v * 30);
        var b = 213 + Math.round(v * 42);
        ctx.fillStyle = 'rgba(' + r + ',' + g + ',' + b + ',' + (0.5 + v * 0.5) + ')';
        ctx.fillRect(x, canvas.height - h, barW - 1, h);
      }
    }
    draw();

    // Record with low bitrate for compression (32kbps mono ~6MB for 27min vs ~30MB default)
    chunks = [];
    var mime = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : 'audio/webm';
    mr = new MediaRecorder(mixedStream, {mimeType: mime, audioBitsPerSecond: 32000});
    mr.ondataavailable = function(e) { if (e.data.size>0) chunks.push(e.data); };
    mr.onstop = function() {
      blob = new Blob(chunks, {type:mime});
      var sizeMB = (blob.size / 1024 / 1024).toFixed(1);
      stopAllStreams();
      stopVisualizer();
      document.getElementById('acts').style.display = 'flex';
      document.getElementById('rhint').textContent = 'Nahravka pripravena';
      document.getElementById('audio-info').innerHTML = '<span class="active-src">' + sizeMB + ' MB</span>';
    };
    mr.start(1000);

    // Keep screen on and audio session alive
    await requestWakeLock();
    startSilentAudio();

    document.getElementById('rbtn').classList.add('on');
    document.getElementById('rhint').textContent = 'Nahravam... klikni pre zastavenie';
    document.getElementById('acts').style.display = 'none';
    secs = 0; recordStartTime = Date.now();
    document.getElementById('rtime').textContent = '0:00';
    ti = setInterval(function(){
      secs = Math.floor((Date.now() - recordStartTime) / 1000);
      var m=Math.floor(secs/60), s=secs%60;
      document.getElementById('rtime').textContent = m+':'+(s<10?'0':'')+s;
    }, 1000);
    clearMsg();
  } catch(e) {
    stopAllStreams();
    setMsg('Chyba: '+e.message,'err');
  }
}

function stopRec() {
  if (mr && mr.state!=='inactive') mr.stop();
  clearInterval(ti);
  releaseWakeLock();
  stopSilentAudio();
  recordStartTime = null;
  document.getElementById('rbtn').classList.remove('on');
}

  blob=null; chunks=[];

    }
    var data = await r.json();
    if (vaultId) await vaultUpdate(vaultId, { status: 'uploading', jobId: data.job_id || null });
    if (data.job_id) {
      setMsg('Prepisujem... 10-60 sekund','inf');
      fill.style.width='40%';

            fill.style.width = Math.min(40 + attempts, 95)+'%';

              }
          } else if (jr.status === 404) {

              var recent = mr.ok ? await mr.json() : [];
              var now = Date.now();

                if (vaultId) vaultUpdate(vaultId, { status: 'done' }).then(function() {
                  setTimeout(function() { vaultDelete(vaultId).then(refreshVaultUI); }, 5000);
                });
                setTimeout(discard, 2500);
              } else {
                setMsg('Spracovanie prebieha...','inf');
                continue;
              }
            } catch(e2) { continue; }
          } else {

            fill.style.width='0%';
            if (vaultId) vaultUpdate(vaultId, { status: 'error', errorMsg: jd.error || 'Server error' }).then(refreshVaultUI);
          }

      }

      setMsg('Napad odoslany!','ok'); if(_recentOpen) loadRecentIdeas();
      if (vaultId) vaultUpdate(vaultId, { status: 'done' }).then(function() {
        setTimeout(function() { vaultDelete(vaultId).then(refreshVaultUI); }, 5000);
      });
      setTimeout(discard, 2500);
    }
  } catch(e) {
    if (vaultId) {
      setMsg('Chyba: '+e.message+' \u2014 nahravka je ulozena lokalne','err');
      vaultUpdate(vaultId, { status: 'error', errorMsg: e.message }).then(refreshVaultUI);
    } else {
      setMsg('Chyba: '+e.message,'err');
    }
  }
  finally { btn.disabled=false; btn.textContent='Odoslat napad'; setTimeout(function(){fill.style.width='0%';},2000); }
}

async function sendTextIdea() {
  var text = document.getElementById('txtIdea').value.trim();
  if (!text) { setMsg('Napiste text napadu','err'); return; }
  var dept = document.getElementById('dept').value;
  var role = document.getElementById('role').value;
  if (!dept||!role) { setMsg('Vyber oddelenie a rolu','err'); return; }
  var btn = document.getElementById('txtSend');
  btn.disabled=true; btn.textContent='Odosielam...';
  var fill = document.getElementById('bfill'), w=0;
  var p = setInterval(function(){ w=Math.min(w+2,85); fill.style.width=w+'%'; if(w>=85) clearInterval(p); }, 600);
  try {
    var r = await fetch(API+'/api/ideas/text', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({text:text, department:dept, role:role, visibility:currentVisibility}),
      credentials:'include'
    });
    clearInterval(p); fill.style.width='100%';
    if (r.ok) {
      setMsg('Textovy napad odoslany!','ok');
      document.getElementById('txtIdea').value = '';
      setTimeout(function(){ fill.style.width='0%'; clearMsg(); }, 2500);
    } else { var d=await r.json().catch(function(){return {};}); setMsg(d.error||'Chyba','err'); }
  } catch(e) { setMsg('Chyba: '+e.message,'err'); }
  finally { btn.disabled=false; btn.textContent='Odoslat textovy napad'; setTimeout(function(){fill.style.width='0%';},2000); }
}

function setMsg(t,c){ var e=document.getElementById('smsg'); e.textContent=t; e.className='smsg '+c; }
function clearMsg(){ var e=document.getElementById('smsg'); e.textContent=''; e.className='smsg'; }

// ── File Upload ──
var selectedFile = null;

function handleFileSelect(input) {
  if (input.files.length > 0) processSelectedFile(input.files[0]);
}

function processSelectedFile(file) {
  var ext = file.name.split('.').pop().toLowerCase();
  var allowed = ['mp3','wav','ogg','m4a','webm','flac','opus','mp4','mpeg','wma','aac'];
  if (allowed.indexOf(ext) === -1 && !file.type.startsWith('audio/')) {
    setMsg('Nepodporovany format. Pouzite audio subor.', 'err');
    return;
  }
  if (file.size > 200 * 1024 * 1024) {
    setMsg('Subor je prilis velky (max 200MB)', 'err');
    return;
  }
  selectedFile = file;
  document.getElementById('file-drop-area').style.display = 'none';
  document.getElementById('file-selected').style.display = 'block';
  document.getElementById('fileSend').style.display = 'block';
  document.getElementById('file-name').textContent = file.name;
  var sizeMB = (file.size / 1024 / 1024).toFixed(1);
  document.getElementById('file-size').textContent = sizeMB + ' MB';
  var preview = document.getElementById('file-preview');
  preview.src = URL.createObjectURL(file);
  clearMsg();
}

function resetFileUpload() {
  selectedFile = null;
  document.getElementById('file-drop-area').style.display = '';
  document.getElementById('file-selected').style.display = 'none';
  document.getElementById('fileSend').style.display = 'none';
  document.getElementById('fileInput').value = '';
  var preview = document.getElementById('file-preview');
  if (preview.src) { URL.revokeObjectURL(preview.src); preview.src = ''; }
}

async function sendFileIdea() {
  if (!selectedFile) return;
  var dept = document.getElementById('dept').value;
  var role = document.getElementById('role').value;
  if (!dept || !role) { setMsg('Vyber oddelenie a rolu', 'err'); return; }
  var btn = document.getElementById('fileSend');
  btn.disabled = true; btn.textContent = 'Odosiela sa...';
  var fill = document.getElementById('bfill');
  fill.style.width = '5%';
  
  // Save to vault FIRST
  var vaultId = null;
  try {
    vaultId = await vaultSave(selectedFile, selectedFile.name, dept, role, currentVisibility);
    setMsg('Subor zalohovany. Odosielam...', 'inf');
    fill.style.width = '15%';
    refreshVaultUI();
  } catch(e) { /* continue without vault */ }
  
  try {
    var fd = new FormData();
    fd.append('audio', selectedFile, selectedFile.name);
    fd.append('department', dept);
    fd.append('role', role);
    fd.append('visibility', currentVisibility);
    var r = await fetch(API + '/api/ideas/upload', { method: 'POST', body: fd, credentials: 'include' });
    if (!r.ok) {
      var d = await r.json().catch(function() { return {}; });
      throw new Error(d.error || 'Chyba ' + r.status);
    }
    var data = await r.json();
    if (vaultId) await vaultUpdate(vaultId, { status: 'uploading', jobId: data.job_id || null });
    if (data.job_id) {
      setMsg('Prepisujem... 10-60 sekund', 'inf');
      fill.style.width = '40%';
      await pollFileJob(data.job_id, fill, btn, vaultId);
    } else {
      fill.style.width = '100%';
      setMsg('Napad odoslany!', 'ok');
      if (vaultId) vaultUpdate(vaultId, { status: 'done' }).then(function() {
        setTimeout(function() { vaultDelete(vaultId).then(refreshVaultUI); }, 5000);
      });
      setTimeout(function() { resetFileUpload(); fill.style.width = '0%'; clearMsg(); }, 2500);
      btn.disabled = false; btn.textContent = 'Odoslat audio napad';
    }
  } catch(e) {
    if (vaultId) {
      setMsg('Chyba: ' + e.message + ' \u2014 subor je ulozeny lokalne', 'err');
      vaultUpdate(vaultId, { status: 'error', errorMsg: e.message }).then(refreshVaultUI);
    } else {
      setMsg('Chyba: ' + e.message, 'err');
    }
    btn.disabled = false; btn.textContent = 'Odoslat audio napad';
    fill.style.width = '0%';
  }
}

async function pollFileJob(jobId, fill, btn, vaultId) {
  var attempts = 0;
  while (attempts < 200) {
    await new Promise(function(r) { setTimeout(r, 3000); });
    attempts++;
    try {
      var r = await fetch(API + '/api/ideas/job/' + jobId, { credentials: 'include' });
      if (r.status === 202) {
        fill.style.width = Math.min(40 + attempts, 95) + '%';
        if (attempts % 10 === 0) setMsg('Prepisujem... este chvilu', 'inf');
        continue;
      }
      if (r.ok) {
        var data = await r.json();
        fill.style.width = '100%';
        if (vaultId) vaultUpdate(vaultId, { status: 'done' }).then(function() {
          setTimeout(function() { vaultDelete(vaultId).then(refreshVaultUI); }, 5000);
        });
        if (data.warning) {
          setMsg(data.warning, 'err');
          setTimeout(function() { resetFileUpload(); fill.style.width = '0%'; }, 8000);
        } else {
          setMsg('Napad odoslany!', 'ok');
          setTimeout(function() { resetFileUpload(); fill.style.width = '0%'; clearMsg(); }, 2500);
        }
      } else if (r.status === 404) {
        // Job completed fast - check if idea was saved via my-recent
        try {
          var mr = await fetch(API + '/api/ideas/my-recent', { credentials: 'include' });
          var recent = mr.ok ? await mr.json() : [];
          var now = Date.now();
          var found = (recent || []).some(function(idea) {
            return (now - new Date(idea.created_at).getTime()) < 120000;
          });
          if (found) {
            fill.style.width = '100%';
            setMsg('Napad odoslany!', 'ok');
            if (vaultId) vaultUpdate(vaultId, { status: 'done' }).then(function() {
              setTimeout(function() { vaultDelete(vaultId).then(refreshVaultUI); }, 5000);
            });
            setTimeout(function() { resetFileUpload(); fill.style.width = '0%'; clearMsg(); }, 2500);
          } else {
            setMsg('Spracovanie prebieha...', 'inf');
            continue;
          }
        } catch(e2) { continue; }
      } else {
        var d = await r.json().catch(function() { return {}; });
        setMsg(d.error || 'Chyba pri spracovani', 'err');
        fill.style.width = '0%';
        if (vaultId) vaultUpdate(vaultId, { status: 'error', errorMsg: d.error || 'Server error' }).then(refreshVaultUI);
      }
      break;
    } catch(e) { continue; }
  }
  if (attempts >= 200) {
    setMsg('Timeout - nahravka ulozena lokalne', 'err');
    fill.style.width = '0%';
    if (vaultId) vaultUpdate(vaultId, { status: 'error', errorMsg: 'Timeout' }).then(refreshVaultUI);
  }
  btn.disabled = false; btn.textContent = 'Odoslat audio napad';
}

document.addEventListener('keydown', function(e){
  if (e.key==='Enter' && document.getElementById('login-screen').style.display!=='none') doLogin();
});

// Click & drag-drop for file upload area
document.addEventListener('DOMContentLoaded', function() {
  var dropArea = document.getElementById('file-drop-area');
  if (!dropArea) return;
  dropArea.addEventListener('click', function() {
    document.getElementById('fileInput').click();
  });
  dropArea.addEventListener('dragover', function(e) {
    e.preventDefault(); dropArea.classList.add('dragover');
  });
  dropArea.addEventListener('dragleave', function() {
    dropArea.classList.remove('dragover');
  });
  dropArea.addEventListener('drop', function(e) {
    e.preventDefault(); dropArea.classList.remove('dragover');
    if (e.dataTransfer.files.length > 0) {
      processSelectedFile(e.dataTransfer.files[0]);
    }
  });
});

init();
refreshVaultUI();
