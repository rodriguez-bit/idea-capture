<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; connect-src https://ridea.onrender.com http://localhost:5001; media-src *">
<title>Ridea</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f172a; --surface: #1e293b; --surface2: #263348;
  --border: #334155; --text: #e2e8f0; --muted: #94a3b8;
  --primary: #6366f1; --red: #ef4444; --green: #22c55e;
}
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; user-select: none; }

/* DRAG REGION (title bar area) */
.drag-region { height: 28px; -webkit-app-region: drag; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 12px; flex-shrink: 0; }
.drag-region span { font-size: 12px; color: var(--muted); }

.content { flex: 1; overflow-y: auto; padding: 20px; }

.logo-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
.logo-row .icon { font-size: 24px; }
.logo-row h1 { font-size: 18px; font-weight: 700; }
.subtitle { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
.user-bar { font-size: 12px; color: var(--muted); margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
.user-bar button { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 12px; -webkit-app-region: no-drag; }
.user-bar button:hover { color: var(--red); }

/* LOGIN */
#login-screen { display: flex; flex-direction: column; }
.input { width: 100%; padding: 10px 13px; background: var(--surface2); border: 1px solid var(--border); border-radius: 9px; color: var(--text); font-size: 14px; outline: none; margin-bottom: 10px; }
.input:focus { border-color: var(--primary); }
.btn { width: 100%; padding: 11px; border: none; border-radius: 9px; font-size: 14px; font-weight: 600; cursor: pointer; }
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: #4f46e5; }
.err { font-size: 12px; color: var(--red); margin-top: 8px; display: none; }

/* RECORDER */
#recorder-screen { display: none; }
.sel { width: 100%; padding: 10px 13px; background: var(--surface2); border: 1px solid var(--border); border-radius: 9px; color: var(--text); font-size: 14px; outline: none; margin-bottom: 10px; appearance: none; }
.sel:focus { border-color: var(--primary); }
.record-btn { width: 100%; padding: 16px; border: none; border-radius: 13px; font-size: 16px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 9px; margin-top: 6px; transition: all 0.2s; -webkit-app-region: no-drag; }
.record-btn.idle { background: var(--primary); color: white; }
.record-btn.idle:hover { background: #4f46e5; }
.record-btn.rec { background: var(--red); color: white; animation: pulse 1.5s infinite; }
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.8}}
.timer { text-align: center; font-size: 32px; font-weight: 700; letter-spacing: 2px; padding: 14px 0; display: none; }
.timer.show { display: block; }
.dot { display: inline-block; width: 9px; height: 9px; background: var(--red); border-radius: 50%; margin-right: 8px; animation: blink 1s infinite; }
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.send-btn { width: 100%; padding: 13px; background: var(--green); color: white; border: none; border-radius: 13px; font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 10px; display: none; -webkit-app-region: no-drag; }
.send-btn.show { display: block; }
.send-btn:hover { background: #16a34a; }
.send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.discard { text-align: center; font-size: 13px; color: var(--muted); cursor: pointer; margin-top: 8px; display: none; }
.discard.show { display: block; }
.discard:hover { color: var(--red); }
.status { font-size: 13px; text-align: center; padding: 9px 12px; border-radius: 9px; margin-top: 10px; display: none; }
.status.success { background: rgba(34,197,94,.1); color: var(--green); display: block; }
.status.error { background: rgba(239,68,68,.1); color: var(--red); display: block; }
.status.info { background: rgba(99,102,241,.1); color: #818cf8; display: block; }
.progress { height: 3px; background: var(--border); border-radius: 3px; margin-top: 10px; display: none; }
.progress.show { display: block; }
.progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width .3s; }
.admin-link { text-align: center; margin-top: 14px; font-size: 12px; color: var(--muted); cursor: pointer; }
.admin-link:hover { color: var(--primary); }
</style>
</head>
<body>

<div class="drag-region"><span>💡 Ridea</span></div>

<div class="content">

<!-- LOGIN -->
<div id="login-screen">
  <div class="logo-row"><span class="icon">💡</span><h1>Ridea</h1></div>
  <p class="subtitle">Interný nástroj pre zachytávanie nápadov</p>
  <input class="input" type="email" id="l-email" placeholder="E-mail">
  <input class="input" type="password" id="l-pass" placeholder="Heslo">
  <button class="btn btn-primary" onclick="doLogin()">Prihlásiť sa</button>
  <div class="err" id="l-err"></div>
</div>

<!-- RECORDER -->
<div id="recorder-screen">
  <div class="user-bar">
    <span id="user-label">—</span>
    <button onclick="doLogout()">Odhlásiť</button>
  </div>

  <select class="sel" id="department">
    <option value="">— oddelenie —</option>
    <option value="development">Vývoj</option>
    <option value="marketing">Marketing</option>
    <option value="production">Produkcia</option>
    <option value="management">Manažment</option>
    <option value="other">Iné</option>
  </select>

  <select class="sel" id="role">
    <option value="">— rola —</option>
    <option value="c-level">C-level</option>
    <option value="manager">Manažér</option>
    <option value="employee">Zamestnanec</option>
  </select>

  <button class="record-btn idle" id="rec-btn" onclick="toggleRecord()">
    <span id="btn-ic">🔴</span><span id="btn-tx">Nahrať nápad</span>
  </button>

  <div class="timer" id="timer"><span class="dot"></span><span id="timer-tx">0:00</span></div>
  <button class="send-btn" id="send-btn" onclick="submitIdea()">✅ Odoslať nápad</button>
  <div class="discard" id="discard-lnk" onclick="discardRecording()">× Zahodiť nahrávku</div>
  <div class="progress" id="progress"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="status" id="status-msg"></div>
  <div class="admin-link" onclick="openAdmin()">🌐 Otvoriť Admin konzolu</div>
</div>

</div>

<script>
let API_BASE = 'https://ridea.onrender.com';
let mediaRecorder = null;
let audioChunks = [];
let audioBlob = null;
let timerInterval = null;
let seconds = 0;
let currentUser = null;

async function init() {
  if (window.electron) {
    API_BASE = await window.electron.getApiBase();
    const saved = await window.electron.getStore('user');
    if (saved) {
      try {
        const r = await fetch(`${API_BASE}/api/current-user`, { credentials: 'include' });
        if (r.ok) {
          currentUser = await r.json();
          showRecorder();
          return;
        }
      } catch(e) {}
    }
  }
  showLogin();
}

function showLogin() {
  document.getElementById('login-screen').style.display = '';
  document.getElementById('recorder-screen').style.display = 'none';
}

function showRecorder() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('recorder-screen').style.display = '';
  document.getElementById('user-label').textContent = `👤 ${currentUser.name}`;
  if (currentUser.department) document.getElementById('department').value = currentUser.department;
}

async function doLogin() {
  const email = document.getElementById('l-email').value.trim();
  const pass = document.getElementById('l-pass').value;
  const err = document.getElementById('l-err');
  err.style.display = 'none';
  try {
    const r = await fetch(`${API_BASE}/api/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pass }),
      credentials: 'include'
    });
    if (r.ok) {
      const d = await r.json();
      currentUser = { name: d.name, role: d.role, email };
      if (window.electron) await window.electron.setStore('user', currentUser);
      showRecorder();
    } else {
      const d = await r.json();
      err.textContent = d.error || 'Nesprávne údaje';
      err.style.display = 'block';
    }
  } catch(e) {
    err.textContent = 'Chyba pripojenia: ' + e.message;
    err.style.display = 'block';
  }
}

async function doLogout() {
  try { await fetch(`${API_BASE}/api/logout`, { method: 'POST', credentials: 'include' }); } catch(e) {}
  if (window.electron) await window.electron.setStore('user', null);
  currentUser = null;
  showLogin();
}

function openAdmin() {
  if (window.electron) {
    // Opens in default browser via shell.openExternal in main.js
    window.location.href = API_BASE;
  } else {
    window.open(API_BASE, '_blank');
  }
}

async function toggleRecord() {
  if (mediaRecorder && mediaRecorder.state === 'recording') stopRecording();
  else await startRecording();
}

async function startRecording() {
  const dept = document.getElementById('department').value;
  const role = document.getElementById('role').value;
  if (!dept || !role) { showStatus('Vyberte oddelenie a rolu', 'error'); return; }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];
    const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : 'audio/webm';
    mediaRecorder = new MediaRecorder(stream, { mimeType });
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      audioBlob = new Blob(audioChunks, { type: mimeType });
      stream.getTracks().forEach(t => t.stop());
      document.getElementById('send-btn').classList.add('show');
      document.getElementById('discard-lnk').classList.add('show');
    };
    mediaRecorder.start(1000);

    const btn = document.getElementById('rec-btn');
    btn.className = 'record-btn rec';
    document.getElementById('btn-ic').textContent = '⬛';
    document.getElementById('btn-tx').textContent = 'Zastaviť nahrávanie';

    seconds = 0;
    document.getElementById('timer').classList.add('show');
    timerInterval = setInterval(() => {
      seconds++;
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      document.getElementById('timer-tx').textContent = `${m}:${s.toString().padStart(2,'0')}`;
    }, 1000);
    clearStatus();
  } catch(e) {
    showStatus(e.name === 'NotAllowedError' ? 'Prístup k mikrofónu odmietnutý' : `Chyba: ${e.message}`, 'error');
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  clearInterval(timerInterval);
  document.getElementById('timer').classList.remove('show');
  document.getElementById('rec-btn').className = 'record-btn idle';
  document.getElementById('btn-ic').textContent = '🔴';
  document.getElementById('btn-tx').textContent = 'Nahrať znova';
}

function discardRecording() {
  audioBlob = null; audioChunks = [];
  document.getElementById('send-btn').classList.remove('show');
  document.getElementById('discard-lnk').classList.remove('show');
  document.getElementById('rec-btn').className = 'record-btn idle';
  document.getElementById('btn-ic').textContent = '🔴';
  document.getElementById('btn-tx').textContent = 'Nahrať nápad';
  clearStatus();
}

async function submitIdea() {
  if (!audioBlob) return;
  const dept = document.getElementById('department').value;
  const role = document.getElementById('role').value;
  const sendBtn = document.getElementById('send-btn');
  sendBtn.disabled = true;
  sendBtn.textContent = '⏳ Odosiela sa...';
  showStatus('Nahrávam a prepísujem... môže trvať 10–30 sekúnd', 'info');
  document.getElementById('progress').classList.add('show');
  animateProgress();

  try {
    const formData = new FormData();
    formData.append('audio', audioBlob, `idea_${Date.now()}.webm`);
    formData.append('department', dept);
    formData.append('role', role);

    const r = await fetch(`${API_BASE}/api/ideas/upload`, {
      method: 'POST', body: formData, credentials: 'include'
    });
    document.getElementById('progress-fill').style.width = '100%';

    if (r.ok) {
      const d = await r.json();
      showStatus('✅ Nápad úspešne odoslaný!', 'success');
      setTimeout(discardRecording, 3000);
    } else {
      const d = await r.json().catch(() => ({}));
      showStatus(d.error || 'Chyba pri odosielaní', 'error');
    }
  } catch(e) {
    showStatus(`Chyba: ${e.message}`, 'error');
  } finally {
    sendBtn.disabled = false;
    sendBtn.textContent = '✅ Odoslať nápad';
    setTimeout(() => {
      document.getElementById('progress').classList.remove('show');
      document.getElementById('progress-fill').style.width = '0%';
    }, 2000);
  }
}

let progInt = null;
function animateProgress() {
  let w = 0;
  clearInterval(progInt);
  progInt = setInterval(() => {
    w = Math.min(w + 2, 85);
    document.getElementById('progress-fill').style.width = w + '%';
    if (w >= 85) clearInterval(progInt);
  }, 600);
}

function showStatus(msg, type) {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  el.className = `status ${type}`;
}
function clearStatus() { document.getElementById('status-msg').className = 'status'; }

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none') doLogin();
});

init();
</script>
</body>
</html>
