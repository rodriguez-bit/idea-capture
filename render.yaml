services:
  - type: web
    name: ridea
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ridea-db
          property: connectionString
      - key: FLASK_DEBUG
        value: "0"
databases:
  - name: ridea-db
    databaseName: ridea
    user: ridea
    plan: free
