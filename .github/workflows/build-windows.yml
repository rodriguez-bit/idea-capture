name: Build Windows EXE

on:
  push:
    paths:
      - 'electron/**'
      - '.github/workflows/build-windows.yml'
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Read version
        id: ver
        shell: bash
        run: |
          VERSION=$(node -p "require('./electron/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        shell: bash
        working-directory: electron
        run: |
          npm install
          echo "Dependencies installed"
          ls -la node_modules/.bin/ | head -20

      - name: Build NSIS installer
        shell: bash
        working-directory: electron
        run: |
          npx electron-builder --win nsis --x64 --publish never 2>&1
          echo "Build done"
          ls -la dist/ 2>/dev/null || true

      - name: List output files
        if: always()
        shell: bash
        run: |
          echo "=== dist contents ==="
          find electron/dist -type f 2>/dev/null || echo "No dist folder"

      - name: Create Release and Upload
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release create "v${{ steps.ver.outputs.version }}" \
            --repo ${{ github.repository }} \
            --title "Ridea v${{ steps.ver.outputs.version }}" \
            --notes "Ridea v${{ steps.ver.outputs.version }} - NSIS installer, fialovy dizajn, textove napady, logo RI" \
            --latest 2>/dev/null || true

          # Upload NSIS installer .exe
          for f in electron/dist/*.exe; do
            [ -f "$f" ] && gh release upload "v${{ steps.ver.outputs.version }}" "$f" \
              --repo ${{ github.repository }} --clobber
          done
