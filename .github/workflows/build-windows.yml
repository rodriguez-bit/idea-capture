name: Build Windows EXE

on:
  push:
    paths:
      - 'electron/**'
      - '.github/workflows/build-windows.yml'
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Read version
        id: ver
        shell: bash
        run: |
          VERSION=$(node -p "require('./electron/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        shell: bash
        working-directory: electron
        run: |
          npm install --no-audit --no-fund 2>&1
          echo "--- node_modules contents ---"
          ls node_modules/ | head -20
          echo "--- electron binary ---"
          npx electron --version 2>&1 || echo 'electron binary check done'

      - name: Build Windows portable
        shell: bash
        working-directory: electron
        run: |
          DEBUG=electron-builder npx electron-builder --win portable -c.extraMetadata.version=${{ steps.ver.outputs.version }} 2>&1

      - name: List dist output
        shell: bash
        run: |
          ls -laR electron/dist/ 2>/dev/null || echo 'No dist directory'

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release create "v${{ steps.ver.outputs.version }}" \
            --repo ${{ github.repository }} \
            --title "Ridea v${{ steps.ver.outputs.version }}" \
            --notes "Ridea v${{ steps.ver.outputs.version }} - fialovy dizajn #512D6D" \
            --latest 2>/dev/null || true

      - name: Upload to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          for f in electron/dist/*.exe; do
            [ -f "$f" ] && gh release upload "v${{ steps.ver.outputs.version }}" "$f" \
              --repo ${{ github.repository }} --clobber
          done
