name: Build Windows EXE

on:
  push:
    paths:
      - 'electron/**'
      - '.github/workflows/build-windows.yml'
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wine for cross-compilation
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -qq
          sudo apt-get install -y -qq wine64 wine32 2>/dev/null || sudo apt-get install -y -qq wine64

      - name: Read version
        id: ver
        run: |
          VERSION=$(node -p "require('./electron/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Prepare source
        run: |
          mkdir -p build-src
          cp electron/main.js build-src/
          cp electron/preload.js build-src/
          cp electron/recorder.html build-src/
          cp -r electron/assets build-src/ 2>/dev/null || true
          echo '{"name":"ridea","version":"'"${{ steps.ver.outputs.version }}"'","main":"main.js","dependencies":{}}' > build-src/package.json
          cat build-src/package.json

      - name: Package for Windows
        run: |
          npx --yes @electron/packager@latest build-src Ridea \
            --platform=win32 \
            --arch=x64 \
            --electron-version=28.3.3 \
            --out=win-out \
            --overwrite \
            --app-version=${{ steps.ver.outputs.version }} 2>&1

      - name: Create ZIP
        run: |
          cd win-out/Ridea-win32-x64
          zip -r ../../Ridea-${{ steps.ver.outputs.version }}-win-x64.zip .
          cd ../..
          ls -la *.zip

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.ver.outputs.version }}" \
            --repo ${{ github.repository }} \
            --title "Ridea v${{ steps.ver.outputs.version }}" \
            --notes "Ridea v${{ steps.ver.outputs.version }} — fialovy dizajn #512D6D" \
            --latest 2>/dev/null || true

      - name: Upload to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "v${{ steps.ver.outputs.version }}" \
            "Ridea-${{ steps.ver.outputs.version }}-win-x64.zip" \
            --repo ${{ github.repository }} --clobber
