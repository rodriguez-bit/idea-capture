name: Build Windows EXE

on:
  push:
    paths:
      - 'electron/**'
      - '.github/workflows/build-windows.yml'
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Read version
        id: ver
        shell: bash
        run: |
          VERSION=$(node -p "require('./electron/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install Pillow
        run: pip install Pillow

      - name: Generate RI icon
        shell: python
        run: |
          import os
          os.makedirs('electron/assets', exist_ok=True)

          from PIL import Image, ImageDraw, ImageFont

          def make_icon_image(size):
              img = Image.new('RGBA', (size, size), (81, 45, 109, 255))
              draw = ImageDraw.Draw(img)
              pad = int(size * 0.12)
              r = int(size * 0.2)
              draw.rounded_rectangle([pad, pad, size-pad, size-pad], radius=r, fill=(61, 31, 84, 255))
              fs = int(size * 0.45)
              try:
                  font = ImageFont.truetype("C:/Windows/Fonts/arialbd.ttf", fs)
              except:
                  try:
                      font = ImageFont.truetype("C:/Windows/Fonts/segoeui.ttf", fs)
                  except:
                      font = ImageFont.load_default()
              text = "RI"
              bbox = draw.textbbox((0,0), text, font=font)
              x = (size - (bbox[2]-bbox[0])) // 2 - bbox[0]
              y = (size - (bbox[3]-bbox[1])) // 2 - bbox[1]
              draw.text((x, y), text, font=font, fill=(255, 255, 255, 255))
              return img

          sizes = [256, 128, 64, 48, 32, 16]
          images = [make_icon_image(s) for s in sizes]
          images[0].save('electron/assets/icon.ico', format='ICO', sizes=[(s, s) for s in sizes])
          images[0].save('electron/assets/icon.png', format='PNG')
          print(f"Created ICO with sizes: {sizes}")
          print(f"ICO size: {os.path.getsize('electron/assets/icon.ico')} bytes")

      - name: Install dependencies
        working-directory: electron
        run: npm install

      - name: Build with electron-builder
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --x64 --publish always

      - name: List output
        shell: bash
        run: |
          echo "=== Build output ==="
          ls -la electron/dist/ || true
          echo "=== Latest yml ==="
          cat electron/dist/latest.yml || true
