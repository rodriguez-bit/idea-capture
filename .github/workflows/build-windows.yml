name: Build Windows EXE

on:
  push:
    paths:
      - 'electron/**'
      - '.github/workflows/build-windows.yml'
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Read version
        id: ver
        shell: bash
        run: |
          VERSION=$(node -p "require('./electron/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        shell: bash
        working-directory: electron
        run: npm install --no-audit --no-fund

      - name: Build Windows
        shell: bash
        working-directory: electron
        run: |
          npx electron-builder --win --publish never --config.publish.provider=generic --config.publish.url=https://example.com 2>&1

      - name: List output
        if: always()
        shell: bash
        run: find electron/dist -type f 2>/dev/null || echo 'No dist'

      - name: Create Release
        shell: bash
        run: |
          gh release create "v${{ steps.ver.outputs.version }}" \
            --repo ${{ github.repository }} \
            --title "Ridea v${{ steps.ver.outputs.version }}" \
            --notes "Ridea v${{ steps.ver.outputs.version }} - fialovy dizajn #512D6D" \
            --latest 2>/dev/null || true

      - name: Upload to Release
        shell: bash
        run: |
          shopt -s nullglob
          for f in electron/dist/*.exe electron/dist/*.zip; do
            gh release upload "v${{ steps.ver.outputs.version }}" "$f" \
              --repo ${{ github.repository }} --clobber
          done
