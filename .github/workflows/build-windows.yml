name: Build Windows EXE

on:
  push:
    paths:
      - 'electron/**'
      - '.github/workflows/build-windows.yml'
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Read version
        id: ver
        shell: bash
        run: |
          VERSION=$(node -p "require('./electron/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Prepare build directory
        shell: bash
        run: |
          mkdir build-src
          cp electron/main.js build-src/
          cp electron/preload.js build-src/
          cp electron/recorder.html build-src/
          cp electron/package.json build-src/
          cp -r electron/assets build-src/ 2>/dev/null || true

      - name: Install dependencies
        shell: bash
        working-directory: build-src
        run: |
          npm install
          echo "Dependencies installed"

      - name: Build with electron-builder
        shell: bash
        working-directory: build-src
        run: |
          npx electron-builder --win --publish never
          echo "Build done"
          ls -la dist/ 2>/dev/null

      - name: Create Release and Upload
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release create "v${{ steps.ver.outputs.version }}" \
            --repo ${{ github.repository }} \
            --title "Ridea v${{ steps.ver.outputs.version }}" \
            --notes "Ridea v${{ steps.ver.outputs.version }} - fialovy dizajn, textove napady, logo RI" \
            --latest 2>/dev/null || true

          # Upload NSIS installer
          for f in build-src/dist/*.exe; do
            [ -f "$f" ] && gh release upload "v${{ steps.ver.outputs.version }}" "$f" \
              --repo ${{ github.repository }} --clobber
          done

          # Upload portable too
          for f in build-src/dist/*.zip; do
            [ -f "$f" ] && gh release upload "v${{ steps.ver.outputs.version }}" "$f" \
              --repo ${{ github.repository }} --clobber
          done
