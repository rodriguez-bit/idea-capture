name: Build Windows EXE

on:
  push:
    paths:
      - 'electron/**'
      - '.github/workflows/build-windows.yml'
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Read version
        id: ver
        shell: bash
        run: |
          VERSION=$(node -p "require('./electron/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate proper ICO icon
        shell: bash
        run: |
          pip install Pillow
          python3 << 'PYEOF'
          from PIL import Image, ImageDraw, ImageFont

          def make_icon_image(size):
              img = Image.new('RGBA', (size, size), (81, 45, 109, 255))
              draw = ImageDraw.Draw(img)
              pad = int(size * 0.12)
              r = int(size * 0.2)
              draw.rounded_rectangle([pad, pad, size-pad, size-pad], radius=r, fill=(61, 31, 84, 255))
              fs = int(size * 0.45)
              try:
                  font = ImageFont.truetype("C:/Windows/Fonts/arialbd.ttf", fs)
              except:
                  try:
                      font = ImageFont.truetype("C:/Windows/Fonts/segoeui.ttf", fs)
                  except:
                      font = ImageFont.load_default()
              text = "RI"
              bbox = draw.textbbox((0,0), text, font=font)
              x = (size - (bbox[2]-bbox[0])) // 2 - bbox[0]
              y = (size - (bbox[3]-bbox[1])) // 2 - bbox[1]
              draw.text((x, y), text, font=font, fill=(255, 255, 255, 255))
              return img

          sizes = [256, 128, 64, 48, 32, 16]
          images = [make_icon_image(s) for s in sizes]
          images[0].save('electron/assets/icon.ico', format='ICO', sizes=[(s, s) for s in sizes])
          images[0].save('electron/assets/icon.png', format='PNG')
          print(f"Created ICO with sizes: {sizes}")
          PYEOF

      - name: Install dependencies
        shell: bash
        working-directory: electron
        run: |
          npm install
          echo "Dependencies installed"

      - name: Build NSIS installer
        shell: bash
        working-directory: electron
        run: |
          npx electron-builder --win nsis --x64 --publish never 2>&1
          echo "Build done"

      - name: List output files
        if: always()
        shell: bash
        run: |
          echo "=== dist contents ==="
          find electron/dist -type f -name "*.exe" 2>/dev/null || echo "No exe files"
          find electron/dist -type f 2>/dev/null | head -20

      - name: Create Release and Upload
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          REPO="${{ github.repository }}"

          gh release create "v${VERSION}" \
            --repo "${REPO}" \
            --title "Ridea v${VERSION}" \
            --notes "Ridea v${VERSION} - NSIS installer, fialovy dizajn, textove napady, logo RI" \
            --latest 2>/dev/null || echo "Release already exists"

          # Find and upload all .exe files
          find electron/dist -name "*.exe" -type f | while read f; do
            echo "Uploading: $f"
            gh release upload "v${VERSION}" "$f" --repo "${REPO}" --clobber || echo "Upload failed for $f"
          done

          echo "Upload complete"
