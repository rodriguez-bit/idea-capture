name: Build Windows EXE

on:
  push:
    paths:
      - 'electron/**'
      - '.github/workflows/build-windows.yml'
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Read version
        id: ver
        shell: bash
        run: |
          VERSION=$(node -p "require('./electron/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install dependencies and build
        shell: bash
        working-directory: electron
        run: |
          npm ci
          npx electron-builder --win portable --config.extraMetadata.version=${{ steps.ver.outputs.version }}

      - name: List output
        shell: bash
        run: |
          find electron/dist -type f -name "*.exe" -o -name "*.zip" 2>/dev/null || true
          ls -la electron/dist/ 2>/dev/null || true

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release create "v${{ steps.ver.outputs.version }}" \
            --repo ${{ github.repository }} \
            --title "Ridea v${{ steps.ver.outputs.version }}" \
            --notes "Ridea v${{ steps.ver.outputs.version }} — fialovy dizajn #512D6D" \
            --latest \
            2>/dev/null || true

      - name: Upload to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          for f in electron/dist/*.exe; do
            [ -f "$f" ] && gh release upload "v${{ steps.ver.outputs.version }}" "$f" \
              --repo ${{ github.repository }} --clobber
          done
