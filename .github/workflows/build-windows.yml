name: Build Windows EXE

on:
  push:
    paths:
      - 'electron/**'
      - '.github/workflows/build-windows.yml'
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Read version
        id: ver
        run: |
          VERSION=$(node -p "require('./electron/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup build directory
        run: |
          cd electron
          npm install
          ls -la node_modules/ | head -20

      - name: Package for Windows with electron-builder
        run: |
          cd electron
          npx electron-builder --win dir --publish never 2>&1 || true
          npx electron-builder --win zip --publish never 2>&1

      - name: Find output files
        run: |
          find electron/dist -type f \( -name '*.exe' -o -name '*.zip' \) 2>/dev/null
          ls -laR electron/dist/ 2>/dev/null || echo 'No dist directory'

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.ver.outputs.version }}" \
            --repo ${{ github.repository }} \
            --title "Ridea v${{ steps.ver.outputs.version }}" \
            --notes "Ridea v${{ steps.ver.outputs.version }} - fialovy dizajn #512D6D" \
            --latest 2>/dev/null || true

      - name: Upload artifacts to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for f in electron/dist/*.exe electron/dist/*.zip; do
            [ -f "$f" ] && gh release upload "v${{ steps.ver.outputs.version }}" "$f" \
              --repo ${{ github.repository }} --clobber
          done
