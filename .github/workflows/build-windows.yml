name: Build Windows EXE

on:
  push:
    paths:
      - 'electron/**'
      - '.github/workflows/build-windows.yml'
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Read version
        id: ver
        shell: bash
        run: |
          VERSION=$(node -p "require('./electron/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate RI icon
        shell: bash
        run: |
          pip install Pillow
          python3 << 'PYEOF'
          from PIL import Image, ImageDraw, ImageFont

          def make_icon_image(size):
              img = Image.new('RGBA', (size, size), (81, 45, 109, 255))
              draw = ImageDraw.Draw(img)
              pad = int(size * 0.12)
              r = int(size * 0.2)
              draw.rounded_rectangle([pad, pad, size-pad, size-pad], radius=r, fill=(61, 31, 84, 255))
              fs = int(size * 0.45)
              try:
                  font = ImageFont.truetype("C:/Windows/Fonts/arialbd.ttf", fs)
              except:
                  try:
                      font = ImageFont.truetype("C:/Windows/Fonts/segoeui.ttf", fs)
                  except:
                      font = ImageFont.load_default()
              text = "RI"
              bbox = draw.textbbox((0,0), text, font=font)
              x = (size - (bbox[2]-bbox[0])) // 2 - bbox[0]
              y = (size - (bbox[3]-bbox[1])) // 2 - bbox[1]
              draw.text((x, y), text, font=font, fill=(255, 255, 255, 255))
              return img

          sizes = [256, 128, 64, 48, 32, 16]
          images = [make_icon_image(s) for s in sizes]
          images[0].save('electron/assets/icon.ico', format='ICO', sizes=[(s, s) for s in sizes])
          images[0].save('electron/assets/icon.png', format='PNG')
          print(f"Created ICO with sizes: {sizes}")
          PYEOF

      - name: Prepare and package
        shell: bash
        run: |
          mkdir build-src
          cp electron/main.js build-src/
          cp electron/preload.js build-src/
          cp electron/recorder.html build-src/
          cp -r electron/assets build-src/ 2>/dev/null || true
          cd build-src
          npm init -y
          npm install electron@28.3.3 electron-updater@6.8.3
          cd ..
          npx --yes @electron/packager@latest build-src Ridea \
            --platform=win32 \
            --arch=x64 \
            --out=win-out \
            --overwrite \
            --app-version=${{ steps.ver.outputs.version }} \
            --icon=electron/assets/icon.ico \
            --no-prune 2>&1
          echo "Packaging done"

      - name: Create Inno Setup script
        shell: bash
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          cat > installer.iss << ISSEOF
          [Setup]
          AppName=Ridea
          AppVersion=${VERSION}
          AppPublisher=Dajana Rodriguez
          DefaultDirName={autopf}\Ridea
          DefaultGroupName=Ridea
          OutputDir=installer-out
          OutputBaseFilename=Ridea-Setup-${VERSION}
          SetupIconFile=electron\assets\icon.ico
          Compression=lzma2
          SolidCompression=yes
          ArchitecturesAllowed=x64compatible
          ArchitecturesInstallIn64BitMode=x64compatible
          UninstallDisplayIcon={app}\Ridea.exe
          WizardStyle=modern

          [Languages]
          Name: "sk"; MessagesFile: "compiler:Default.isl"

          [Tasks]
          Name: "desktopicon"; Description: "Vytvorit skratku na ploche"; GroupDescription: "Dalsie moznosti:"; Flags: checked

          [Files]
          Source: "win-out\Ridea-win32-x64\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

          [Icons]
          Name: "{group}\Ridea"; Filename: "{app}\Ridea.exe"
          Name: "{group}\Odinštalovať Ridea"; Filename: "{uninstallexe}"
          Name: "{autodesktop}\Ridea"; Filename: "{app}\Ridea.exe"; Tasks: desktopicon

          [Run]
          Filename: "{app}\Ridea.exe"; Description: "Spustit Ridea"; Flags: nowait postinstall skipifsilent
          ISSEOF

      - name: Build installer with Inno Setup
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Create ZIP too
        if: success()
        shell: pwsh
        run: |
          Compress-Archive -Path "win-out\Ridea-win32-x64\*" -DestinationPath "Ridea-${{ steps.ver.outputs.version }}-win-x64.zip"

      - name: Create Release and Upload
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          REPO="${{ github.repository }}"

          gh release create "v${VERSION}" \
            --repo "${REPO}" \
            --title "Ridea v${VERSION}" \
            --notes "Ridea v${VERSION} - fialovy dizajn, textove napady, logo RI" \
            --latest 2>/dev/null || echo "Release already exists"

          # Upload installer
          gh release upload "v${VERSION}" \
            "installer-out/Ridea-Setup-${VERSION}.exe" \
            --repo "${REPO}" --clobber || echo "Installer upload failed"

          # Upload ZIP too
          gh release upload "v${VERSION}" \
            "Ridea-${VERSION}-win-x64.zip" \
            --repo "${REPO}" --clobber || echo "ZIP upload failed"

          echo "Upload complete"
