name: Build Windows EXE

on:
  push:
    paths:
      - 'electron/**'
      - '.github/workflows/build-windows.yml'
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Read version
        id: ver
        shell: bash
        run: |
          VERSION=$(node -p "require('./electron/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Prepare source
        shell: bash
        run: |
          mkdir -p build-src
          cp electron/main.js build-src/
          cp electron/preload.js build-src/
          cp electron/recorder.html build-src/
          cp -r electron/assets build-src/ 2>/dev/null || true
          echo '{"name":"ridea","version":"${{ steps.ver.outputs.version }}","main":"main.js","dependencies":{}}' > build-src/package.json

      - name: Package with electron-packager
        shell: bash
        run: |
          npx --yes @electron/packager@latest build-src Ridea \
            --platform=win32 \
            --arch=x64 \
            --electron-version=28.3.3 \
            --out=win-out \
            --overwrite \
            --app-version=${{ steps.ver.outputs.version }} \
            --no-prune

      - name: Create ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path "win-out\Ridea-win32-x64\*" -DestinationPath "Ridea-${{ steps.ver.outputs.version }}-win-x64.zip"

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release create "v${{ steps.ver.outputs.version }}" \
            --repo ${{ github.repository }} \
            --title "Ridea v${{ steps.ver.outputs.version }}" \
            --notes "Ridea v${{ steps.ver.outputs.version }} — fialovy dizajn #512D6D" \
            --latest 2>/dev/null || true

      - name: Upload to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "v${{ steps.ver.outputs.version }}" \
            "Ridea-${{ steps.ver.outputs.version }}-win-x64.zip" \
            --repo ${{ github.repository }} --clobber
