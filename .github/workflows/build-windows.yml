name: Build Windows EXE

on:
  push:
    paths:
      - 'electron/**'
      - '.github/workflows/build-windows.yml'
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Read version
        id: ver
        shell: bash
        run: |
          VERSION=$(node -p "require('./electron/package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install Electron
        shell: bash
        run: |
          mkdir build-src
          cp electron/main.js build-src/
          cp electron/preload.js build-src/
          cp electron/recorder.html build-src/
          cp -r electron/assets build-src/ 2>/dev/null || true
          cd build-src
          npm init -y
          npm install electron@28.3.3 electron-updater@6.8.3
          echo "Electron installed"
          npx electron --version

      - name: Package with electron-packager
        shell: bash
        run: |
          npx --yes @electron/packager@latest build-src Ridea \
            --platform=win32 \
            --arch=x64 \
            --out=win-out \
            --overwrite \
            --app-version=${{ steps.ver.outputs.version }} \
            --no-prune 2>&1
          echo "Packaging done"
          ls -la win-out/ 2>/dev/null

      - name: Create ZIP
        if: success()
        shell: pwsh
        run: |
          Compress-Archive -Path "win-out\Ridea-win32-x64\*" -DestinationPath "Ridea-${{ steps.ver.outputs.version }}-win-x64.zip"
          Get-ChildItem *.zip

      - name: Create Release and Upload
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release create "v${{ steps.ver.outputs.version }}" \
            --repo ${{ github.repository }} \
            --title "Ridea v${{ steps.ver.outputs.version }}" \
            --notes "Ridea v${{ steps.ver.outputs.version }} - fialovy dizajn #512D6D" \
            --latest 2>/dev/null || true
          gh release upload "v${{ steps.ver.outputs.version }}" \
            "Ridea-${{ steps.ver.outputs.version }}-win-x64.zip" \
            --repo ${{ github.repository }} --clobber
