name: Build Mac DMG

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Prepare clean source
        run: |
          mkdir -p src-clean
          cp electron/main.js src-clean/
          cp electron/preload.js src-clean/
          cp electron/recorder.html src-clean/
          cp -r electron/assets src-clean/ 2>/dev/null || true
          echo '{"name":"ridea","version":"1.0.15","main":"main.js","dependencies":{}}' > src-clean/package.json

      - name: Package app (arm64 + x64)
        run: |
          npx --yes @electron/packager src-clean Ridea \
            --platform=darwin \
            --arch=arm64,x64 \
            --electron-version=28.3.3 \
            --out=mac-out \
            --overwrite \
            --app-version=1.0.15

      - name: Create DMG (arm64 — Apple Silicon)
        run: |
          mkdir dmg_arm64
          cp -r "mac-out/Ridea-darwin-arm64/Ridea.app" dmg_arm64/
          ln -s /Applications dmg_arm64/Applications
          hdiutil create \
            -volname "Ridea" \
            -srcfolder dmg_arm64 \
            -ov -format UDZO \
            "Ridea-1.0.15-arm64.dmg"

      - name: Create DMG (x64 — Intel Mac)
        run: |
          mkdir dmg_x64
          cp -r "mac-out/Ridea-darwin-x64/Ridea.app" dmg_x64/
          ln -s /Applications dmg_x64/Applications
          hdiutil create \
            -volname "Ridea" \
            -srcfolder dmg_x64 \
            -ov -format UDZO \
            "Ridea-1.0.15-x64.dmg"

      - name: Upload DMGs to GitHub Release v1.0.15
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload v1.0.15 \
            "Ridea-1.0.15-arm64.dmg" \
            "Ridea-1.0.15-x64.dmg" \
            --repo dajanarodriguez/idea-capture \
            --clobber
