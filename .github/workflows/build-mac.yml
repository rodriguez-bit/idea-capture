name: Build Mac DMG

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: electron
        run: npm install

      - name: Build Mac DMG (arm64 + x64)
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --mac --x64 --arm64

      - name: Upload DMGs to GitHub Release v1.0.15
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload v1.0.15 \
            electron/dist/Ridea-1.0.15-arm64.dmg \
            electron/dist/Ridea-1.0.15-x64.dmg \
            electron/dist/latest-mac.yml \
            --repo dajanarodriguez/idea-capture \
            --clobber
