name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate launcher icons
        run: |
          sudo apt-get install -y python3-pip
          pip3 install Pillow
          python3 << 'PYEOF'
          from PIL import Image, ImageDraw, ImageFont
          import os

          def make_icon(size):
              img = Image.new('RGBA', (size, size), (15, 23, 42, 255))
              draw = ImageDraw.Draw(img)
              pad = int(size * 0.1)
              r = int(size * 0.22)
              draw.rounded_rectangle([pad, pad, size-pad, size-pad], radius=r, fill=(99, 102, 241, 255))
              fs = int(size * 0.42)
              try:
                  font = ImageFont.truetype("/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf", fs)
              except:
                  font = ImageFont.load_default()
              text = "Ri"
              bbox = draw.textbbox((0,0), text, font=font)
              x = (size - (bbox[2]-bbox[0])) // 2 - bbox[0]
              y = (size - (bbox[3]-bbox[1])) // 2 - bbox[1]
              draw.text((x, y), text, font=font, fill=(255, 255, 255, 255))
              return img

          densities = {'mdpi': 48, 'hdpi': 72, 'xhdpi': 96, 'xxhdpi': 144, 'xxxhdpi': 192}
          base = 'android/app/src/main/res'
          for d, s in densities.items():
              os.makedirs(f'{base}/mipmap-{d}', exist_ok=True)
              make_icon(s).save(f'{base}/mipmap-{d}/ic_launcher.png')
              print(f'Created mipmap-{d}/ic_launcher.png ({s}x{s})')
          PYEOF

      - name: Build APK
        working-directory: android
        run: |
          gradle wrapper --gradle-version=8.4
          ./gradlew assembleRelease

      - name: Upload APK to GitHub Release v1.0.15
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          find android -name "*.apk" | head -5
          for f in $(find android -name "*.apk"); do
            cp "$f" "Ridea-1.0.15.apk"
            gh release upload v1.0.15 "Ridea-1.0.15.apk" \
              --repo dajanarodriguez/idea-capture --clobber
          done
